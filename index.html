<script>
// ── SOUNDS & MUSIC ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}

// Master volume nodes
const sfxGain = AC.createGain();
const musicGain = AC.createGain();
sfxGain.connect(AC.destination);
musicGain.connect(AC.destination);

let sfxVol = parseFloat(localStorage.getItem('obbySfx') ?? '0.5');
let musicVol = parseFloat(localStorage.getItem('obbyMusic') ?? '0.4');
sfxGain.gain.value = sfxVol;
musicGain.gain.value = musicVol;

function playCoin(){
  resumeAC();
  [880,1320].forEach((freq,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(sfxGain);
    o.type='sine';o.frequency.setValueAtTime(freq,AC.currentTime+i*0.04);
    o.frequency.exponentialRampToValueAtTime(freq*1.5,AC.currentTime+i*0.04+0.08);
    g.gain.setValueAtTime(0.28,AC.currentTime+i*0.04);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.04+0.18);
    o.start(AC.currentTime+i*0.04);o.stop(AC.currentTime+i*0.04+0.2);
  });
}

function playClick(){
  resumeAC();
  const buf=AC.createBuffer(1,AC.sampleRate*0.03,AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  const src=AC.createBufferSource(),g=AC.createGain(),filt=AC.createBiquadFilter();
  filt.type='bandpass';filt.frequency.value=2200;filt.Q.value=1.2;
  src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(sfxGain);
  g.gain.setValueAtTime(0.18,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.03);
  src.start();src.stop(AC.currentTime+0.04);
}

// ── MUSIC ENGINE ──
// Uses a note-queue sequencer with tight lookahead — never drops out
let musicPlaying = false;
let musicScheduler = null;

const N = {
  C3:130.81,F3:174.61,G3:196.00,A3:220.00,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,
  _:0
};

// Each entry: [channel, freq, beatDuration]
// channel 0=melody, 1=bass, 2=hihat, 3=kick
const PATTERN = [
  // bar 1
  [0,N.E5,.25],[0,N.E5,.25],[0,N._,.25],[0,N.E5,.25],
  [0,N._,.25],[0,N.C5,.25],[0,N.E5,.5],
  [0,N.G5,.5],[0,N._,.5],[0,N.G4,.5],[0,N._,.5],
  // bar 2
  [0,N.C5,.375],[0,N._,.125],[0,N.G4,.375],[0,N._,.125],
  [0,N.E4,.375],[0,N._,.125],
  [0,N.A4,.25],[0,N._,.125],[0,N.B4,.25],[0,N._,.125],[0,N.A4,.375],[0,N._,.125],
  [0,N.G4,.25],[0,N.E5,.25],[0,N.G5,.25],[0,N.A5,.5],
  [0,N.F5,.25],[0,N.G5,.375],[0,N._,.125],[0,N.E5,.375],[0,N._,.125],
  [0,N.C5,.25],[0,N.D5,.25],[0,N.B4,.375],[0,N._,.375],
];

const BASS_PAT = [
  [1,N.C3,1],[1,N.G3,1],[1,N.A3,1],[1,N.F3,1],
  [1,N.C3,1],[1,N.G3,1],[1,N.A3,1],[1,N.F3,1],
];

// Build full flat note list with absolute beat positions
function buildNoteList(bpm) {
  const beat = 60/bpm;
  const notes = [];
  let t = 0;
  PATTERN.forEach(([ch,freq,dur]) => {
    notes.push({ch,freq,t,dur:dur*beat});
    t += dur*beat;
  });
  const loopLen = t;

  // Overlay bass (resets time)
  let bt = 0;
  BASS_PAT.forEach(([ch,freq,dur]) => {
    notes.push({ch,freq,t:bt,dur:dur*beat*0.75});
    bt += dur*beat;
  });

  // Hi-hats every half beat
  const halfBeat = beat*0.5;
  for(let i=0; i<Math.round(loopLen/halfBeat); i++){
    notes.push({ch:2,freq:0,t:i*halfBeat,dur:0.04,accent:i%2===0});
  }

  // Kicks every 2 beats
  for(let i=0; i<Math.round(loopLen/(beat*2)); i++){
    notes.push({ch:3,freq:0,t:i*beat*2,dur:0.18});
  }

  notes.sort((a,b)=>a.t-b.t);
  return {notes, loopLen};
}

function fireNote(note, when) {
  const freq = note.freq;
  if(note.ch===0) {
    // Square wave melody
    if(!freq) return;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(0.055,when+0.01);
    g.gain.setValueAtTime(0.055,when+note.dur*0.75);
    g.gain.exponentialRampToValueAtTime(0.0001,when+note.dur);
    o.connect(g);g.connect(musicGain);
    o.start(when);o.stop(when+note.dur+0.02);
  } else if(note.ch===1) {
    // Triangle bass
    if(!freq) return;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='triangle'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,when);
    g.gain.linearRampToValueAtTime(0.1,when+0.015);
    g.gain.setValueAtTime(0.1,when+note.dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.0001,when+note.dur);
    o.connect(g);g.connect(musicGain);
    o.start(when);o.stop(when+note.dur+0.02);
  } else if(note.ch===2) {
    // Hi-hat (filtered white noise)
    const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*0.05),AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='highpass';f.frequency.value=8000;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(musicGain);
    const vol=note.accent?0.045:0.022;
    g.gain.setValueAtTime(vol,when);
    g.gain.exponentialRampToValueAtTime(0.0001,when+0.05);
    src.start(when);src.stop(when+0.06);
  } else if(note.ch===3) {
    // Kick drum
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(160,when);
    o.frequency.exponentialRampToValueAtTime(40,when+0.12);
    g.gain.setValueAtTime(0.28,when);
    g.gain.exponentialRampToValueAtTime(0.0001,when+0.18);
    o.connect(g);g.connect(musicGain);
    o.start(when);o.stop(when+0.2);
  }
}

function getMusicBPM(){
  if(typeof gs==='undefined'||gs==='start'||gs==='gameover') return 130;
  return Math.min(140+(stage-1)*5, 185);
}

// Sequencer state
let seqNotes = [];
let seqLoopLen = 0;
let seqLoopStart = 0;  // AC time when current loop started
let seqNextNote = 0;   // index into seqNotes
const LOOKAHEAD = 0.15; // schedule 150ms ahead

function tickSequencer() {
  if(!musicPlaying) return;
  resumeAC();
  const now = AC.currentTime;

  // If we've passed the loop end, restart
  if(seqLoopLen > 0 && now >= seqLoopStart + seqLoopLen - 0.05) {
    // rebuild with current BPM (allows tempo changes each loop)
    const {notes,loopLen} = buildNoteList(getMusicBPM());
    seqNotes = notes;
    seqLoopLen = loopLen;
    seqLoopStart = seqLoopStart + seqLoopLen;
    seqNextNote = 0;
  }

  // Schedule any notes due within the lookahead window
  while(seqNextNote < seqNotes.length) {
    const note = seqNotes[seqNextNote];
    const noteTime = seqLoopStart + note.t;
    if(noteTime > now + LOOKAHEAD) break;
    fireNote(note, Math.max(noteTime, now+0.005));
    seqNextNote++;
  }
}

function startMusic(){
  if(musicPlaying) return;
  resumeAC();
  musicPlaying = true;
  const {notes,loopLen} = buildNoteList(getMusicBPM());
  seqNotes = notes;
  seqLoopLen = loopLen;
  seqLoopStart = AC.currentTime + 0.1;
  seqNextNote = 0;
  // Tick every 25ms — tight enough to never miss a note
  musicScheduler = setInterval(tickSequencer, 25);
}

function stopMusic(){
  musicPlaying = false;
  clearInterval(musicScheduler);
}

function drawEmoteChar(ctx, px, py, c, t, total) {
  const prog = 1 - (t / total); // 0→1 progress
  const w=28, h=36;
  // Draw trail for emotes
  if(c.trail !== 'none') drawTrail(ctx, px, py, w, h, c.trail, af);

  if(emote.type === 'flip') {
    // Full body backflip: rotate around center
    const angle = prog * Math.PI * 2;
    ctx.save();
    ctx.translate(px + w/2, py + h/2);
    ctx.rotate(angle);
    ctx.translate(-(w/2), -(h/2));
    drawChar(ctx, 0, 0, c, 0, true);
    // Sparkle trail during flip
    if(prog > 0.1 && prog < 0.9) {
      for(let i=0;i<3;i++){
        ctx.globalAlpha = 0.5 * (1-prog);
        ctx.fillStyle = ['#ff6b35','#fbbf24','#60a5fa'][i];
        ctx.beginPath();
        ctx.arc(-8 + i*4 + Math.random()*4, h/2 + Math.sin(prog*10+i)*8, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
  } else if(emote.type === 'dance') {
    // Bouncy side-to-side dance
    const bounce = Math.abs(Math.sin(prog * Math.PI * 4)) * 12;
    const lean = Math.sin(prog * Math.PI * 4) * 0.25;
    ctx.save();
    ctx.translate(px + w/2, py + h);
    ctx.rotate(lean);
    ctx.translate(-(w/2), -h);
    drawChar(ctx, 0, -bounce, c, af * 2, true);
    // music notes
    if(Math.floor(prog * 8) % 2 === 0) {
      ctx.globalAlpha = 0.8 * (1-prog);
      ctx.font = '14px serif'; ctx.fillStyle = '#fbbf24';
      ctx.fillText('♪', w + 4, -bounce - 4 - prog*20);
      ctx.fillText('♫', -10, -bounce - 14 - prog*15);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  } else if(emote.type === 'wave') {
    // Arm wave + body sway
    const sway = Math.sin(prog * Math.PI * 3) * 4;
    ctx.save();
    drawChar(ctx, px + sway, py, c, 0, true);
    // Draw waving arm separately
    const armAngle = Math.sin(prog * Math.PI * 4) * 0.8 - 0.4;
    ctx.translate(px + w, py + 14);
    ctx.rotate(armAngle);
    ctx.fillStyle = c.skin;
    ctx.fillRect(0, 0, 10, 6);
    // Hand
    ctx.beginPath(); ctx.arc(10, 3, 4, 0, Math.PI*2); ctx.fill();
    // sparkle around hand
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fbbf24'; ctx.font = '10px serif';
    ctx.fillText('✨', 10, -2);
    ctx.globalAlpha = 1;
    ctx.restore();
  } else if(emote.type === 'celebrate') {
    // Jump up with arms raised + confetti
    const jumpH = Math.sin(prog * Math.PI) * 20;
    drawChar(ctx, px, py - jumpH, c, 0, true);
    // Confetti burst
    const confColors = ['#ff6b35','#fbbf24','#4ade80','#60a5fa','#a855f7','#f472b6'];
    for(let i=0; i<8; i++){
      const angle = (i/8)*Math.PI*2 + prog*3;
      const dist = prog * 40;
      ctx.globalAlpha = Math.max(0, 1 - prog*1.5);
      ctx.fillStyle = confColors[i%confColors.length];
      ctx.fillRect(px + w/2 + Math.cos(angle)*dist - 2, py - jumpH + h/2 + Math.sin(angle)*dist - 2, 5, 5);
    }
    ctx.globalAlpha = 1;
    // Stars above head
    ctx.font = '14px serif'; ctx.globalAlpha = Math.sin(prog*Math.PI);
    ctx.fillText('⭐', px + w/2 - 6, py - jumpH - 10);
    ctx.globalAlpha = 1;
  } else if(emote.type === 'spin') {
    // Horizontal spin (squash/stretch illusion)
    const spinPhase = prog * Math.PI * 2;
    const scaleX = Math.abs(Math.cos(spinPhase));
    const flipped = Math.cos(spinPhase) < 0;
    ctx.save();
    ctx.translate(px + w/2, py + h/2);
    ctx.scale(flipped ? -Math.max(scaleX, 0.05) : Math.max(scaleX, 0.05), 1);
    ctx.translate(-(w/2), -(h/2));
    drawChar(ctx, 0, 0, c, af, true);
    ctx.restore();
    // Speed lines
    for(let i=0;i<5;i++){
      ctx.globalAlpha = 0.3 * (1-prog);
      ctx.strokeStyle = ['#ff6b35','#fbbf24','#60a5fa'][i%3];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - 5 - i*6, py + 5 + i*6);
      ctx.lineTo(px + w + 5 + i*6, py + 5 + i*6);
      ctx.stroke();
    }
    ctx.globalAlpha = 1; ctx.lineWidth = 1;
  }
}

let shopOwned = JSON.parse(localStorage.getItem('obbyShop') || '[]');

function saveShop(){localStorage.setItem('obbyShop',JSON.stringify(shopOwned));}

function buyItem(item, onUpdate){
  if(item.type==='luckyblock'){
    if(coins < item.price && !infCoins){showToast('❌ Not enough coins!');return;}
    if(luckyBlockCount>=1){showToast('⚠️ You already have a Lucky Block!');return;}
    if(!infCoins){coins-=item.price;localStorage.setItem('obbyCoins',coins);updCoins();}
    luckyBlockCount=1;updLBHud();
    showToast('📦 Lucky Block ready! Press E in-game!');
    if(onUpdate)onUpdate();
    return;
  }
  if(shopOwned.includes(item.id)) return equipItem(item, onUpdate);
  if(coins < item.price && !infCoins){showToast('❌ Not enough coins!');return;}
  if(!infCoins){coins -= item.price; localStorage.setItem('obbyCoins',coins); updCoins();}
  shopOwned.push(item.id);
  saveShop();
  equipItem(item, onUpdate);
  showToast(`✅ Bought ${item.name}!`);
}

function equipItem(item, onUpdate){
  cos[item.type] = item.val;
  if(onUpdate) onUpdate();
}

function applyOutcome(outcome, bx, by){
  showLBResult(outcome);
  playLBSound(outcome.id);
  switch(outcome.id){
    case 'coins':
      if(!infCoins){coins+=50;localStorage.setItem('obbyCoins',coins);}
      updCoins();
      for(let i=0;i<8;i++) coinPop.push({x:bx+Math.random()*40-20,y:by,vy:-2-Math.random()*2,life:50});
      break;
    case 'life':
      lives=Math.min(lives+1,9);updHUD();
      break;
    case 'jump':
      activeEffects.push({type:'jump',until:Date.now()+5000});
      break;
    case 'speed':
      activeEffects.push({type:'speed',until:Date.now()+5000});
      break;
    case 'wings':
      activeEffects.push({type:'wings',until:Date.now()+5000});
      break;
    case 'skin':
      const newSkin = ALL_SKINS[Math.floor(Math.random()*ALL_SKINS.length)];
      cos.skin = newSkin;
      break;
    case 'badluck':
      setTimeout(()=>loseLife(), 400);
      break;
  }
}

function updLBHud(){
  const hud = document.getElementById('lbHud');
  const cnt = document.getElementById('lbCount');
  if(luckyBlockCount>0){hud.style.display='';cnt.textContent=luckyBlockCount;}
  else hud.style.display='none';
}

let lbResultTimer = null;
function showLBResult(outcome){
  const existing = document.getElementById('lbResult');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'lbResult';
  el.style.cssText=`position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:#0f1120;border:3px solid ${outcome.color};border-radius:18px;
    padding:18px 36px;color:${outcome.color};font-size:1.5rem;font-weight:900;
    letter-spacing:2px;z-index:4000;text-align:center;pointer-events:none;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1)`;
  el.textContent = outcome.label;
  document.body.appendChild(el);
  setTimeout(()=>el.style.transform='translate(-50%,-50%) scale(1)',10);
  clearTimeout(lbResultTimer);
  lbResultTimer = setTimeout(()=>{
    el.style.transform='translate(-50%,-50%) scale(0)';
    setTimeout(()=>el.remove(),200);
  },2000);
}

function playLBSound(id){
  resumeAC();
  if(id==='badluck'){
    // descending sad tones
    [400,300,200].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.1,AC.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.15+0.2);
      o.connect(g);g.connect(sfxGain);o.start(AC.currentTime+i*0.15);o.stop(AC.currentTime+i*0.15+0.25);
    });
  } else if(id==='wings'||id==='jump'||id==='speed'){
    // rising magical arpeggio
    [523,659,784,1047].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.12,AC.currentTime+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.08+0.15);
      o.connect(g);g.connect(sfxGain);o.start(AC.currentTime+i*0.08);o.stop(AC.currentTime+i*0.08+0.18);
    });
  } else {
    // happy jingle
    [523,659,784,1047,1319].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.07,AC.currentTime+i*0.07);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.07+0.12);
      o.connect(g);g.connect(sfxGain);o.start(AC.currentTime+i*0.07);o.stop(AC.currentTime+i*0.07+0.15);
    });
  }
}

function placeLuckyBlock(){
  if(luckyBlockCount<=0||gs!=='playing') return;
  luckyBlockCount--;
  updLBHud();
  // place block just in front of player at their feet level
  placedBlocks.push({
    x: pl.x + pl.w/2 - 16,
    y: pl.y + pl.h - 32,
    w: 32, h: 32,
    broken: false,
    sparkles: []
  });
}

function updateLuckyBlocks(){
  // Check effect timers
  activeEffects = activeEffects.filter(e=>Date.now()<e.until);
  const hasWings  = activeEffects.some(e=>e.type==='wings');
  const hasSpeed  = activeEffects.some(e=>e.type==='speed');
  const hasJump   = activeEffects.some(e=>e.type==='jump');

  // Apply movement mods to player constants on the fly
  window._curSpeed = hasSpeed ? SPD*1.7 : SPD;
  window._curJump  = hasJump  ? JF*1.5  : JF;

  if(hasWings){
    // Wings: slow fall + can hold jump to float
    if(pl.vy>0.5) pl.vy *= 0.82;
    if(keys['Space']||keys['ArrowUp']) pl.vy = Math.max(pl.vy-0.4,-3);
  }

  // Check player hits a placed block (bump from below)
  for(const b of placedBlocks){
    if(b.broken) continue;
    const bx=b.x, by=b.y;
    if(pl.x+pl.w>bx+4&&pl.x<bx+b.w-4&&
       pl.y>by&&pl.y<by+b.h+12&&
       pl.y+pl.h>by&&pl.vy<0){
      b.broken=true;
      pl.vy=2; // bonk
      const outcome=rollLuckyBlock();
      // burst sparkles
      for(let i=0;i<16;i++) b.sparkles.push({
        x:bx+16,y:by+16,
        vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,
        life:35,color:outcome.color||'#fbbf24'
      });
      applyOutcome(outcome,bx,by);
    }
    // Update sparkles
    b.sparkles=b.sparkles.filter(s=>s.life>0);
    b.sparkles.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.life--;});
  }
  // Remove fully done blocks (broken + sparkles gone)
  placedBlocks = placedBlocks.filter(b=>!b.broken||b.sparkles.length>0);
}

function drawLuckyBlocks(){
  for(const b of placedBlocks){
    const sx = Math.round(b.x - camX);
    if(!b.broken){
      // Outer glow
      ctx.shadowBlur=16;ctx.shadowColor='#fbbf24';
      // Gold body
      const grad=ctx.createLinearGradient(sx,b.y,sx,b.y+b.h);
      grad.addColorStop(0,'#fde68a');grad.addColorStop(0.5,'#fbbf24');grad.addColorStop(1,'#d97706');
      ctx.fillStyle=grad;ctx.fillRect(sx,b.y,b.w,b.h);
      // Border
      ctx.strokeStyle='#92400e';ctx.lineWidth=2;ctx.strokeRect(sx+1,b.y+1,b.w-2,b.h-2);
      // ? mark
      ctx.shadowBlur=0;ctx.fillStyle='#92400e';
      ctx.font='bold 20px Nunito';ctx.textAlign='center';
      ctx.fillText('?',sx+b.w/2,b.y+b.h-8);ctx.textAlign='left';
      // Shine corner
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(sx+3,b.y+3,8,3);ctx.fillRect(sx+3,b.y+3,3,8);
      ctx.shadowBlur=0;
    }
    // Sparkles
    b.sparkles.forEach(s=>{
      ctx.globalAlpha=s.life/35;
      ctx.fillStyle=s.color;
      ctx.beginPath();ctx.arc(Math.round(s.x-camX),s.y,3,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }

  // Draw active effect indicators on player
  const now=Date.now();
  activeEffects.forEach((e,i)=>{
    const rem=Math.ceil((e.until-now)/1000);
    const px2=Math.round(pl.x-camX);
    const icon=e.type==='wings'?'🪽':e.type==='speed'?'🚀':'🦘';
    ctx.font='13px Nunito';ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fillText(`${icon}${rem}s`,px2+pl.w/2,pl.y-8-i*16);
    ctx.textAlign='left';
  });
}


const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');

function dlp(s,a,b,c){return Math.min(a+(b-a)*((s-1)/(c-1)),b);}
function addSpk(spk,pl2,ch,safe){for(let sx=pl2.x+safe;sx<pl2.x+pl2.w-12;sx+=16){if(Math.random()<ch)spk.push({x:sx,y:pl2.y-14,w:12,h:14});}}
function buildLv(sn){
  const pl2=[],lv=[],mp=[],spk=[];
  const gb=75+Math.min(sn*8,70),ms=dlp(sn,1.4,4.2,12),mw=Math.max(80-sn*4,44);
  const sc=Math.min(.12*(sn-1),.7),sec=10+Math.min(sn*3,30);
  const pw=()=>Math.max(60,(120-sn*4)+(Math.random()*50|0));
  pl2.push({x:0,y:GY,w:260,h:50,c:'#4a9e3f'});let x=280;
  for(let i=0;i<sec;i++){
    const tc=sn>=5?4:3,t=i%tc;
    if(t===0){const gw=gb+(Math.random()*20|0);lv.push({x,y:GY+4,w:gw,h:46});x+=gw;const w2=pw(),lp={x,y:GY,w:w2,h:50,c:'#4a9e3f'};pl2.push(lp);if(sn>=2)addSpk(spk,lp,sc,16);x+=w2+20;}
    else if(t===1){const w2=70+(Math.random()*50|0),ey=GY-65-(Math.random()*45|0),ep={x,y:ey,w:w2,h:18,c:'#6ab04c'};pl2.push(ep);lv.push({x,y:GY+4,w:w2+60,h:46});if(sn>=3)addSpk(spk,ep,sc*.8,0);x+=w2+60;const lp={x,y:GY,w:100,h:50,c:'#4a9e3f'};pl2.push(lp);if(sn>=4)addSpk(spk,lp,sc*.5,12);x+=120;}
    else if(t===2){const gw=90+sn*12;lv.push({x,y:GY+4,w:gw+40,h:46});mp.push({x,y:GY-50-(sn>4?Math.random()*30|0:0),w:mw,h:16,sx:x,ex:x+gw,sp:ms+Math.random()*.4,dir:1,c:'#f0a500'});if(sn>=7)mp.push({x:x+gw*.4,y:GY-80,w:mw-12,h:16,sx:x,ex:x+gw,sp:ms*1.4,dir:-1,c:'#ff8c00'});x+=gw+60;const lp={x,y:GY,w:120,h:50,c:'#4a9e3f'};pl2.push(lp);if(sn>=5)addSpk(spk,lp,sc*.6,14);x+=140;}
    else{const rw=120+(Math.random()*60|0),gp={x,y:GY,w:rw,h:50,c:'#3a7a30'};pl2.push(gp);for(let sx=x+8;sx<x+rw-16;sx+=16)spk.push({x:sx,y:GY-14,w:12,h:14});x+=rw+20;pl2.push({x,y:GY,w:50,h:50,c:'#4a9e3f'});x+=70;}
  }
  pl2.push({x,y:GY,w:130,h:50,c:'#4a9e3f'});
  const built={pl:pl2,lv,mp,spk,fx:x+30};
  spawnCoins(pl2);
  return built;
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if((e.code==='Space'||e.code==='ArrowUp')&&gs==='playing'){e.preventDefault();if(pl.jumps>0){pl.vy=JF;pl.jumps--;pl.ground=false;}}if(e.code==='KeyE'&&gs==='playing')placeLuckyBlock();

function update(){
  if(gs!=='playing')return;af++;
  updateLuckyBlocks();
  const curSpd=window._curSpeed||SPD;
  if(keys['ArrowLeft']||keys['KeyA'])pl.vx=-curSpd;else if(keys['ArrowRight']||keys['KeyD'])pl.vx=curSpd;else pl.vx*=.8;
  pl.vy+=G;pl.x+=pl.vx;pl.y+=pl.vy;
  const tc=pl.x-W*.35;camX+=(tc-camX)*.12;if(camX<0)camX=0;
  for(const m of lv.mp){m.x+=m.sp*m.dir;if(m.x>m.ex){m.x=m.ex;m.dir=-1;}if(m.x<m.sx){m.x=m.sx;m.dir=1;}}
  pl.ground=false;
  for(const p of[...lv.pl,...lv.mp]){if(pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>p.y&&pl.y+pl.h<p.y+p.h+14&&pl.vy>=0){pl.y=p.y-pl.h;pl.vy=0;pl.ground=true;pl.jumps=2;if(p.sp!==undefined)pl.x+=p.sp*p.dir;}}
  for(const l of lv.lv){if(pl.x+pl.w>l.x+4&&pl.x<l.x+l.w-4&&pl.y+pl.h>l.y){loseLife();return;}}
  for(const s of lv.spk){if(pl.x+pl.w-3>s.x+2&&pl.x+3<s.x+s.w-2&&pl.y+pl.h>s.y+4&&pl.y<s.y+s.h){loseLife();return;}}
  if(pl.y>H+100){loseLife();return;}
  if(pl.x+pl.w>lv.fx&&pl.x<lv.fx+30){gs='win';if(stage>best){best=stage;localStorage.setItem('obbyB',best);}updHUD();showOv('STAGE CLEAR! 🎉',`Onto Stage ${stage+1}!`,'▶ NEXT STAGE',nextStage);}
  collectCoins();
}
function drawBG(){

  sky.addColorStop(0,lerpc('#1a1a4e','#2a0a1e',t));sky.addColorStop(.6,lerpc('#2d3a7a','#5a1a3a',t));sky.addColorStop(1,lerpc('#1a2040','#1a0a10',t));

  ctx.fillStyle=stage>=6?'rgba(255,160,160,.7)':'rgba(255,255,255,.6)';
  for(let i=0;i<60;i++){ctx.fillRect((i*137+af*.05)%W,(i*73)%(H*.6),(i%3?1:2),(i%3?1:2));}
  ctx.fillStyle=stage>=5?'rgba(180,80,80,.07)':'rgba(255,255,255,.08)';
  for(let i=0;i<4;i++){const cx=((i*250-camX*.2)%(W+200)+W+200)%(W+200)-100,cy=50+i*35;ctx.beginPath();ctx.ellipse(cx,cy,70,25,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+50,cy-10,50,20,0,0,Math.PI*2);ctx.fill();}

function drawLava(l){const lx=l.x-camX,g=ctx.createLinearGradient(lx,l.y,lx,l.y+l.h);g.addColorStop(0,'#ff4500');g.addColorStop(.4,'#cc2200');g.addColorStop(1,'#880000');ctx.fillStyle=g;ctx.fillRect(lx,l.y,l.w,l.h);ctx.fillStyle='#ff6a00';for(let i=0;i<Math.floor(l.w/20);i++){ctx.beginPath();ctx.ellipse(lx+10+i*20,l.y+6+Math.sin(af*.08+i)*4,8,5,0,0,Math.PI*2);ctx.fill();}ctx.shadowBlur=20;ctx.shadowColor='#ff4500';ctx.fillStyle='rgba(255,69,0,.3)';ctx.fillRect(lx,l.y-8,l.w,8);ctx.shadowBlur=0;}
function drawSpike(s){const sx=Math.round(s.x-camX);if(sx+s.w<-10||sx>W+10)return;const g=ctx.createLinearGradient(sx,s.y,sx+s.w,s.y+s.h);g.addColorStop(0,'#b0b8c8');g.addColorStop(.45,'#e8edf5');g.addColorStop(1,'#606878');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(sx,s.y+s.h);ctx.lineTo(sx+s.w/2,s.y);ctx.lineTo(sx+s.w,s.y+s.h);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx+s.w*.35,s.y+s.h*.85);ctx.lineTo(sx+s.w*.5,s.y+s.h*.1);ctx.stroke();ctx.fillStyle='rgba(220,30,30,.22)';ctx.fillRect(sx,s.y+s.h-4,s.w,4);}
function drawPlat(p){const px=Math.round(p.x-camX);ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(px+4,p.y+4,p.w,p.h);ctx.fillStyle=p.c||'#4a9e3f';ctx.fillRect(px,p.y,p.w,p.h);if(!p.sp){ctx.fillStyle='#6fcf57';ctx.fillRect(px,p.y,p.w,8);ctx.fillStyle='#5bb548';for(let i=4;i<p.w-4;i+=12)ctx.fillRect(px+i,p.y-4,3,6);ctx.fillStyle='#3a7e30';for(let i=0;i<3;i++)ctx.fillRect(px+10+i*(p.w/3),p.y+14,12,4);}else{const g=ctx.createLinearGradient(px,p.y,px,p.y+p.h);g.addColorStop(0,'#ffcc44');g.addColorStop(1,'#e08800');ctx.fillStyle=g;ctx.fillRect(px,p.y,p.w,p.h);ctx.fillStyle='#fff176';ctx.fillRect(px+4,p.y+3,p.w-8,4);ctx.shadowBlur=12;ctx.shadowColor='#ffaa00';ctx.fillStyle='rgba(255,200,0,.2)';ctx.fillRect(px,p.y,p.w,p.h);ctx.shadowBlur=0;}}
function drawFlag(){const fx=lv.fx-camX;if(fx<-10||fx>W+10)return;ctx.fillStyle='#ccc';ctx.fillRect(fx,GY-100,4,100);ctx.fillStyle='#ff3b00';for(let i=0;i<3;i++){ctx.fillRect(fx+4+i*10,GY-95+Math.sin(af*.1+i*.5)*4,10,22);}ctx.shadowBlur=15;ctx.shadowColor='#fc0';ctx.fillStyle='#fe0';ctx.beginPath();ctx.arc(fx+2,GY-102,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}

function showSett(){
  const ex=document.getElementById('sm');if(ex){ex.remove();return;}
  const modal=document.createElement('div');modal.id='sm';modal.onclick=e=>{if(e.target===modal)modal.remove();};
  const box=document.createElement('div');box.id='sb';
  const xb=document.createElement('button');xb.className='sc';xb.textContent='✕';xb.onclick=()=>modal.remove();box.appendChild(xb);
  const h2=document.createElement('h2');h2.textContent='⚙️ SETTINGS';box.appendChild(h2);

  // ── VOLUME SECTION ──
  const vs=document.createElement('div');vs.className='ss';
  const vl=document.createElement('label');vl.textContent='🔊 Sound Levels';vs.appendChild(vl);

  function mkSlider(labelTxt, initVal, onChange){
    const row=document.createElement('div');row.className='vol-row';
    const lbl=document.createElement('label');lbl.textContent=labelTxt;
    const slider=document.createElement('input');slider.type='range';slider.min=0;slider.max=1;slider.step=0.01;slider.value=initVal;
    const val=document.createElement('span');val.textContent=Math.round(initVal*100)+'%';
    slider.oninput=()=>{val.textContent=Math.round(slider.value*100)+'%';onChange(parseFloat(slider.value));};

function showCoinCatch(){
  const existing=document.getElementById('mgoverlay');if(existing)existing.remove();
  stopL();

  const overlay=document.createElement('div');
  overlay.id='mgoverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)';

  const modal=document.createElement('div');
  modal.style.cssText='background:#0f1120;border:3px solid #fbbf24;border-radius:20px;padding:0;overflow:hidden;width:400px;max-width:96vw;position:relative';

  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#92400e,#b45309);padding:14px 20px;display:flex;align-items:center;justify-content:space-between';
  hdr.innerHTML='<span style="font-size:1.3rem;font-weight:900;color:#fde68a;letter-spacing:2px">🪙 COIN CATCH</span><span id="cc-score" style="font-size:1.1rem;font-weight:900;color:#fbbf24">Score: 0</span>';
  modal.appendChild(hdr);

  const body=document.createElement('div');
  body.style.cssText='padding:14px 16px 16px';

  const ccCanvas=document.createElement('canvas');
  ccCanvas.width=348; ccCanvas.height=220;
  ccCanvas.style.cssText='display:block;border-radius:10px;background:#0a0a1a;border:2px solid rgba(255,185,0,.2);width:100%;cursor:none';
  body.appendChild(ccCanvas);

  const statusRow=document.createElement('div');
  statusRow.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-top:10px';
  statusRow.innerHTML='<div id="cc-lives" style="font-size:1rem">❤️❤️❤️</div><div id="cc-timer" style="font-size:.85rem;font-weight:900;color:#fbbf24;letter-spacing:1px">30s</div>';
  body.appendChild(statusRow);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;margin-top:10px';
  const startBtn=document.createElement('button');
  startBtn.className='btn'; startBtn.style.cssText='flex:1;font-size:.9rem;padding:9px';
  startBtn.textContent='▶ START'; 
  const backBtn=document.createElement('button');
  backBtn.className='btn2'; backBtn.style.cssText='padding:9px 16px;font-size:.85rem';
  backBtn.textContent='← BACK'; backBtn.onclick=()=>{overlay.remove();showMainMenu();};
  btnRow.append(backBtn,startBtn);
  body.appendChild(btnRow);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const cc=ccCanvas.getContext('2d');
  const CW=348,CH=220;
  let ccRunning=false,ccScore=0,ccLives=3,ccTime=30,ccRid=null,ccTimerInt=null;
  let ccPaddle={x:CW/2-30,w:60,h:10};
  let ccItems=[];
  let ccFrame=0;

  function ccSpawn(){
    const isBomb=Math.random()<(0.2+ccScore*0.005);
    ccItems.push({x:Math.random()*(CW-20)+10,y:-20,vy:2+Math.random()*2+ccScore*0.05,bomb:isBomb,r:isBomb?12:10});
  }

  function ccDraw(){
    cc.clearRect(0,0,CW,CH);
    // BG stars
    cc.fillStyle='rgba(255,255,255,.4)';
    for(let i=0;i<30;i++) cc.fillRect((i*97+ccFrame*.2)%CW,(i*53)%CH,1,1);
    // Paddle
    const pg=cc.createLinearGradient(ccPaddle.x,CH-20,ccPaddle.x,CH-10);
    pg.addColorStop(0,'#fbbf24');pg.addColorStop(1,'#d97706');
    cc.fillStyle=pg;
    cc.beginPath();if(cc.roundRect)cc.roundRect(ccPaddle.x,CH-20,ccPaddle.w,ccPaddle.h,5);else cc.rect(ccPaddle.x,CH-20,ccPaddle.w,ccPaddle.h);
    cc.fill();
    cc.fillStyle='rgba(255,255,255,.3)';cc.fillRect(ccPaddle.x+4,CH-20,ccPaddle.w-8,3);
    // Items
    ccItems.forEach(it=>{
      if(it.bomb){
        cc.shadowBlur=10;cc.shadowColor='#ff4444';
        cc.fillStyle='#222';cc.beginPath();cc.arc(it.x,it.y,it.r,0,Math.PI*2);cc.fill();
        cc.fillStyle='#ff4444';cc.font=`${it.r*1.6}px serif`;cc.textAlign='center';cc.fillText('💣',it.x,it.y+5);cc.textAlign='left';
        cc.shadowBlur=0;
      } else {
        cc.shadowBlur=8;cc.shadowColor='#fbbf24';
        cc.fillStyle='#fbbf24';cc.beginPath();cc.arc(it.x,it.y,it.r,0,Math.PI*2);cc.fill();
        cc.fillStyle='#fde68a';cc.beginPath();cc.arc(it.x-3,it.y-3,it.r*.4,0,Math.PI*2);cc.fill();
        cc.fillStyle='#92400e';cc.font='bold 8px Nunito';cc.textAlign='center';cc.fillText('$',it.x,it.y+3);cc.textAlign='left';
        cc.shadowBlur=0;
      }
    });
    // Overlay if not running
    if(!ccRunning){
      cc.fillStyle='rgba(0,0,0,.6)';cc.fillRect(0,0,CW,CH);
      cc.fillStyle='#fbbf24';cc.font='bold 18px Nunito';cc.textAlign='center';
      cc.fillText(ccScore>0?`Final Score: ${ccScore}`:'Catch coins, dodge bombs!',CW/2,CH/2);cc.textAlign='left';
    }
  }

  function ccUpdate(){
    if(!ccRunning)return;
    ccFrame++;
    if(ccFrame%Math.max(20-Math.floor(ccScore/5),8)===0) ccSpawn();
    ccItems.forEach(it=>it.y+=it.vy);
    // Collision
    ccItems=ccItems.filter(it=>{
      if(it.y>CH+20)return false;
      if(it.y+it.r>CH-20&&it.y-it.r<CH-10&&it.x>ccPaddle.x&&it.x<ccPaddle.x+ccPaddle.w){
        if(it.bomb){ ccLives--;document.getElementById('cc-lives').textContent='❤️'.repeat(Math.max(0,ccLives));playLBSound('badluck');if(ccLives<=0)ccEnd(); }
        else { ccScore++;document.getElementById('cc-score').textContent='Score: '+ccScore;playCoin(); }
        return false;
      }
      return true;
    });
    ccDraw();
    ccRid=requestAnimationFrame(ccUpdate);
  }

  function ccEnd(){
    ccRunning=false;
    cancelAnimationFrame(ccRid);clearInterval(ccTimerInt);
    if(ccScore>0&&!infCoins){coins+=ccScore*2;localStorage.setItem('obbyCoins',coins);updCoins();}
    startBtn.textContent='🔁 PLAY AGAIN';
    ccDraw();
    // Show result
    const res=document.createElement('div');
    res.style.cssText='text-align:center;margin-top:8px;font-size:.9rem;font-weight:900;color:#fbbf24';
    res.textContent=`🎉 Score: ${ccScore}  |  Earned: ${ccScore*2} coins!`;
    body.insertBefore(res,btnRow);
    setTimeout(()=>res.remove(),4000);
  }

  startBtn.onclick=()=>{
    body.querySelectorAll('.cc-res').forEach(e=>e.remove());
    ccScore=0;ccLives=3;ccTime=30;ccItems=[];ccFrame=0;ccRunning=true;
    document.getElementById('cc-score').textContent='Score: 0';
    document.getElementById('cc-lives').textContent='❤️❤️❤️';
    document.getElementById('cc-timer').textContent='30s';
    startBtn.textContent='⏳ PLAYING…';
    clearInterval(ccTimerInt);
    ccTimerInt=setInterval(()=>{
      ccTime--;document.getElementById('cc-timer').textContent=ccTime+'s';
      if(ccTime<=0){clearInterval(ccTimerInt);ccEnd();}
    },1000);
    cancelAnimationFrame(ccRid);ccUpdate();
  };

  // Mouse / touch control
  ccCanvas.addEventListener('mousemove',e=>{
    const rect=ccCanvas.getBoundingClientRect();
    const scaleX=CW/rect.width;
    ccPaddle.x=Math.max(0,Math.min(CW-ccPaddle.w,(e.clientX-rect.left)*scaleX-ccPaddle.w/2));
  });
  ccCanvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const rect=ccCanvas.getBoundingClientRect();
    const scaleX=CW/rect.width;
    ccPaddle.x=Math.max(0,Math.min(CW-ccPaddle.w,(e.touches[0].clientX-rect.left)*scaleX-ccPaddle.w/2));
  },{passive:false});

  ccDraw();
}

// MINI-GAME 2: LAVA DODGE
// ══════════════════════════════════════════
function showLavaDodge(){
  const existing=document.getElementById('mgoverlay');if(existing)existing.remove();
  stopL();

  const overlay=document.createElement('div');
  overlay.id='mgoverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)';

  const modal=document.createElement('div');
  modal.style.cssText='background:#0f1120;border:3px solid #ff6b35;border-radius:20px;padding:0;overflow:hidden;width:400px;max-width:96vw';

  const hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#7f1d1d,#b91c1c);padding:14px 20px;display:flex;align-items:center;justify-content:space-between';
  hdr.innerHTML='<span style="font-size:1.3rem;font-weight:900;color:#fca5a5;letter-spacing:2px">🌋 LAVA DODGE</span><span id="ld-score" style="font-size:1.1rem;font-weight:900;color:#ff6b35">Best: 0</span>';
  modal.appendChild(hdr);

  const body=document.createElement('div');
  body.style.cssText='padding:14px 16px 16px';

  const ldCanvas=document.createElement('canvas');
  ldCanvas.width=348; ldCanvas.height=240;
  ldCanvas.style.cssText='display:block;border-radius:10px;background:#0a0a1a;border:2px solid rgba(255,107,53,.25);width:100%';
  body.appendChild(ldCanvas);

  const info=document.createElement('div');
  info.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-top:8px';
  info.innerHTML='<div id="ld-time" style="font-size:.85rem;font-weight:900;color:#ff6b35;letter-spacing:1px">Survive: 0s</div><div style="font-size:.7rem;color:rgba(255,255,255,.35)">← → to move</div>';
  body.appendChild(info);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;margin-top:10px';
  const startBtn2=document.createElement('button');
  startBtn2.className='btn';startBtn2.style.cssText='flex:1;font-size:.9rem;padding:9px';startBtn2.textContent='▶ START';
  const backBtn2=document.createElement('button');
  backBtn2.className='btn2';backBtn2.style.cssText='padding:9px 16px;font-size:.85rem';backBtn2.textContent='← BACK';
  btnRow.append(backBtn2,startBtn2);
  body.appendChild(btnRow);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const ld=ldCanvas.getContext('2d');
  const LW=348,LH=240;
  let ldRunning=false,ldTime=0,ldBest=0,ldRid=null,ldInterval=null;
  let ldKeys={};
  let ldPlayer={x:LW/2-14,y:LH-60,w:28,h:36,vx:0};
  let ldLavas=[];
  let ldFrame=0;
  let ldPlatforms=[];

  function ldReset(){
    ldPlayer={x:LW/2-14,y:LH-60,w:28,h:36,vx:0};
    ldLavas=[];ldFrame=0;
    ldPlatforms=[
      {x:0,y:LH-24,w:LW,h:24},
      {x:50,y:LH-90,w:100,h:14},
      {x:200,y:LH-130,w:90,h:14},
      {x:80,y:LH-170,w:80,h:14},
    ];
    // Spawn initial lava
    for(let i=0;i<3;i++) ldSpawnLava();
  }

  function ldSpawnLava(){
    ldLavas.push({x:Math.random()*(LW-40)+10,y:-30,vy:1.5+Math.random()*1.5+ldTime*0.015,w:40,h:18});
  }

  function ldDraw(){
    ld.clearRect(0,0,LW,LH);
    // BG
    const bg=ld.createLinearGradient(0,0,0,LH);bg.addColorStop(0,'#1a0a0a');bg.addColorStop(1,'#2a1010');
    ld.fillStyle=bg;ld.fillRect(0,0,LW,LH);
    // Stars
    ld.fillStyle='rgba(255,150,100,.4)';
    for(let i=0;i<20;i++) ld.fillRect((i*131+ldFrame*.1)%LW,(i*77)%LH,1,1);
    // Platforms
    ldPlatforms.forEach(p=>{
      ld.fillStyle='#4a9e3f';ld.fillRect(p.x,p.y,p.w,p.h);
      ld.fillStyle='#6fcf57';ld.fillRect(p.x,p.y,p.w,6);
    });
    // Lavas
    ldLavas.forEach(lv2=>{
      const g=ld.createLinearGradient(lv2.x,lv2.y,lv2.x,lv2.y+lv2.h);
      g.addColorStop(0,'#ff4500');g.addColorStop(1,'#880000');
      ld.fillStyle=g;ld.fillRect(lv2.x,lv2.y,lv2.w,lv2.h);
      ld.shadowBlur=12;ld.shadowColor='#ff4500';
      ld.fillStyle='#ff6a00';
      for(let i=0;i<2;i++){ld.beginPath();ld.ellipse(lv2.x+10+i*18,lv2.y+5+Math.sin(ldFrame*.1+i)*3,7,4,0,0,Math.PI*2);ld.fill();}
      ld.shadowBlur=0;
    });
    // Player
    drawChar(ld,Math.round(ldPlayer.x),Math.round(ldPlayer.y),cos,ldFrame,false);
    // Overlay
    if(!ldRunning){
      ld.fillStyle='rgba(0,0,0,.65)';ld.fillRect(0,0,LW,LH);
      ld.fillStyle='#ff6b35';ld.font='bold 18px Nunito';ld.textAlign='center';
      ld.fillText(ldTime>0?`Survived ${ldTime}s!`:'Dodge the falling lava!',LW/2,LH/2);
      ld.textAlign='left';
    }
  }

  function ldUpdate(){
    if(!ldRunning)return;
    ldFrame++;
    if(ldFrame%Math.max(80-ldTime*2,25)===0) ldSpawnLava();
    // Player move
    if(ldKeys['ArrowLeft']||ldKeys['KeyA']) ldPlayer.vx=-4;
    else if(ldKeys['ArrowRight']||ldKeys['KeyD']) ldPlayer.vx=4;
    else ldPlayer.vx*=.75;
    ldPlayer.x=Math.max(0,Math.min(LW-ldPlayer.w,ldPlayer.x+ldPlayer.vx));
    // Lava move
    ldLavas.forEach(l=>l.y+=l.vy);
    ldLavas=ldLavas.filter(l=>l.y<LH+40);
    // Collision
    for(const l of ldLavas){
      if(ldPlayer.x+ldPlayer.w-4>l.x+4&&ldPlayer.x+4<l.x+l.w-4&&ldPlayer.y+ldPlayer.h>l.y&&ldPlayer.y<l.y+l.h){
        ldEnd();return;
      }
    }
    ldDraw();
    ldRid=requestAnimationFrame(ldUpdate);
  }

  function ldEnd(){
    ldRunning=false;cancelAnimationFrame(ldRid);clearInterval(ldInterval);
    if(ldTime>ldBest){ldBest=ldTime;document.getElementById('ld-score').textContent='Best: '+ldBest+'s';}
    const earn=Math.floor(ldTime*3);
    if(earn>0&&!infCoins){coins+=earn;localStorage.setItem('obbyCoins',coins);updCoins();}
    startBtn2.textContent='🔁 PLAY AGAIN';
    ldDraw();
    const res=document.createElement('div');
    res.style.cssText='text-align:center;margin-top:8px;font-size:.9rem;font-weight:900;color:#ff6b35';
    res.textContent=`🌋 Survived ${ldTime}s  |  Earned ${earn} coins!`;
    body.insertBefore(res,btnRow);setTimeout(()=>res.remove(),4000);
  }

  startBtn2.onclick=()=>{
    ldReset();ldTime=0;ldRunning=true;
    document.getElementById('ld-time').textContent='Survive: 0s';
    startBtn2.textContent='⏳ PLAYING…';
    clearInterval(ldInterval);
    ldInterval=setInterval(()=>{ldTime++;document.getElementById('ld-time').textContent='Survive: '+ldTime+'s';},1000);
    cancelAnimationFrame(ldRid);ldUpdate();
  };

  document.addEventListener('keydown',ldKeyDn);
  document.addEventListener('keyup',ldKeyUp);
  function ldKeyDn(e){ldKeys[e.code]=true;}
  function ldKeyUp(e){ldKeys[e.code]=false;}
  // Cleanup keys when leaving
  backBtn2._cleanup=()=>{document.removeEventListener('keydown',ldKeyDn);document.removeEventListener('keyup',ldKeyUp);};
  backBtn2.onclick=()=>{backBtn2._cleanup&&backBtn2._cleanup();cancelAnimationFrame(ldRid);clearInterval(ldInterval);overlay.remove();showMainMenu();};

  ldReset();ldDraw();
}

  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)';

  const modal=document.createElement('div');
  modal.style.cssText='background:#0f1120;border:3px solid #a855f7;border-radius:20px;padding:0;overflow:hidden;width:400px;max-width:96vw';

  const hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#3b0764,#6b21a8);padding:14px 20px;display:flex;align-items:center;justify-content:space-between';
  hdr.innerHTML='<span style="font-size:1.3rem;font-weight:900;color:#e9d5ff;letter-spacing:2px">🧠 MEMORY FLASH</span><span id="mf-level" style="font-size:1rem;font-weight:900;color:#a855f7">Level 1</span>';
  modal.appendChild(hdr);

  const body=document.createElement('div');
  body.style.cssText='padding:16px 16px 16px';

  const statusTxt=document.createElement('div');
  statusTxt.id='mf-status';
  statusTxt.style.cssText='text-align:center;font-size:.85rem;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:12px;min-height:20px';
  statusTxt.textContent='Press START to play';
  body.appendChild(statusTxt);

  // 3x3 grid of tiles
  const tileGrid=document.createElement('div');
  tileGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px';
  const tiles=[];
  for(let i=0;i<9;i++){
    const t=document.createElement('div');
    t.style.cssText='height:72px;border-radius:12px;background:rgba(168,85,247,.15);border:2px solid rgba(168,85,247,.25);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:1.6rem';
    t.dataset.idx=i;
    tiles.push(t);
    tileGrid.appendChild(t);
  }
  body.appendChild(tileGrid);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px';
  const startBtn3=document.createElement('button');
  startBtn3.className='btn';startBtn3.style.cssText='flex:1;font-size:.9rem;padding:9px';startBtn3.textContent='▶ START';
  const backBtn3=document.createElement('button');
  backBtn3.className='btn2';backBtn3.style.cssText='padding:9px 16px;font-size:.85rem';backBtn3.textContent='← BACK';backBtn3.onclick=()=>{overlay.remove();showMainMenu();};
  btnRow.append(backBtn3,startBtn3);
  body.appendChild(btnRow);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const EMOJIS=['🔥','⭐','💎','🌙','🍄','🎯','🦋','⚡','🌸'];
  let mfLevel=1,mfSeq=[],mfPlayerSeq=[],mfPhase='idle',mfTimeout=null;

  function setStatus(txt,col='rgba(255,255,255,.5)'){
    statusTxt.textContent=txt;statusTxt.style.color=col;
  }
  function setLevel(n){
    mfLevel=n;document.getElementById('mf-level').textContent='Level '+n;
  }

  function flashTile(idx,color,dur=320){
    return new Promise(res=>{
      tiles[idx].style.background=color;
      tiles[idx].style.transform='scale(1.07)';
      tiles[idx].style.boxShadow=`0 0 18px ${color}`;
      setTimeout(()=>{
        tiles[idx].style.background='rgba(168,85,247,.15)';
        tiles[idx].style.transform='';
        tiles[idx].style.boxShadow='';
        setTimeout(res,80);
      },dur);
    });
  }

  function playMFSound(idx,good=true){
    resumeAC();
    const freqs=[261,294,330,349,392,440,494,523,587];
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=good?'sine':'sawtooth';
    o.frequency.value=good?freqs[idx]:200;
    g.gain.setValueAtTime(0.12,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.25);
    o.connect(g);g.connect(sfxGain);o.start(AC.currentTime);o.stop(AC.currentTime+0.28);
  }

  async function showSequence(){
    mfPhase='showing';
    setStatus('👀 WATCH CAREFULLY…','#a855f7');
    tiles.forEach(t=>t.style.pointerEvents='none');
    await new Promise(r=>setTimeout(r,600));
    for(const idx of mfSeq){
      await flashTile(idx,'rgba(168,85,247,.9)',380);
      playMFSound(idx,true);
      await new Promise(r=>setTimeout(r,120));
    }
    await new Promise(r=>setTimeout(r,300));
    mfPhase='input';
    mfPlayerSeq=[];
    tiles.forEach(t=>t.style.pointerEvents='all');
    setStatus(`🎯 YOUR TURN — ${mfSeq.length} tiles`,'#fbbf24');
  }

  function mfStart(){
    mfSeq=[];mfPlayerSeq=[];
    setLevel(1);
    mfSeq.push(Math.floor(Math.random()*9));
    // Assign emojis to tiles
    tiles.forEach((t,i)=>{t.textContent=EMOJIS[i];t.style.background='rgba(168,85,247,.15)';t.style.boxShadow='';t.style.transform='';});
    startBtn3.textContent='⏳ PLAYING…';
    showSequence();
  }

  async function mfCorrect(){
    // Full sequence matched
    const earn=mfLevel*10;
    if(!infCoins){coins+=earn;localStorage.setItem('obbyCoins',coins);updCoins();}
    setStatus(`✅ CORRECT! +${earn} coins — Level up!`,'#4ade80');
    // Flash all green
    await Promise.all(tiles.map((_,i)=>flashTile(i,'rgba(74,222,128,.7)',300)));
    playLBSound('coins');
    mfLevel++;setLevel(mfLevel);
    mfSeq.push(Math.floor(Math.random()*9));
    await new Promise(r=>setTimeout(r,500));
    showSequence();
  }

  async function mfWrong(){
    mfPhase='idle';
    tiles.forEach(t=>t.style.pointerEvents='none');
    setStatus(`❌ WRONG! You reached Level ${mfLevel}`,'#f87171');
    await Promise.all(tiles.map((_,i)=>flashTile(i,'rgba(248,113,113,.6)',400)));
    playLBSound('badluck');
    startBtn3.textContent='🔁 PLAY AGAIN';
  }

  // Tile click handler
  tiles.forEach(t=>{
    t.onclick=()=>{
      if(mfPhase!=='input')return;
      const idx=parseInt(t.dataset.idx);
      playMFSound(idx,true);
      flashTile(idx,'rgba(251,191,36,.8)',200);
      mfPlayerSeq.push(idx);
      const pos=mfPlayerSeq.length-1;
      if(mfPlayerSeq[pos]!==mfSeq[pos]){mfWrong();return;}
      if(mfPlayerSeq.length===mfSeq.length) mfCorrect();
    };
  });

  startBtn3.onclick=mfStart;
}

// ── INIT ──
lv=buildLv(1);resetPl();updHUD();updCoins();
showMainMenu();
</script></body></html>

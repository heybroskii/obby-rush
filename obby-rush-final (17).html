  const ctrlHint=document.createElement('div');
  ctrlHint.style.cssText='position:absolute;bottom:14px;right:14px;font-size:.58rem;color:rgba(255,255,255,.25);text-align:right;line-height:1.8;pointer-events:none';
  ctrlHint.innerHTML='WASD = Drive &nbsp;|&nbsp; Space = Jump / Boost<br>Q / E = Camera &nbsp;|&nbsp; R = Reset Ball';
  gameWrap.appendChild(ctrlHint);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='position:absolute;top:10px;right:12px;display:flex;gap:7px;z-index:5';
  const kickBtn=document.createElement('button');kickBtn.className='btn';kickBtn.style.cssText='font-size:.8rem;padding:7px 14px';kickBtn.textContent='▶ KICK OFF';
  const settBtn=document.createElement('button');settBtn.className='btn2';settBtn.style.cssText='font-size:.8rem;padding:7px 10px';settBtn.textContent='⚙️';
  settBtn.onclick=()=>showRS3DSettings();
  const backBtn=document.createElement('button');backBtn.className='btn2';backBtn.style.cssText='font-size:.8rem;padding:7px 10px';backBtn.textContent='← Back';
  backBtn.onclick=()=>{cleanup();overlay.remove();if(onBack)onBack();else showMainMenu();};
  btnRow.append(backBtn,settBtn,kickBtn);
  gameWrap.appendChild(btnRow);
  overlay.appendChild(gameWrap);
  document.body.appendChild(overlay);

  // ── Canvas setup ──
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){
    W=canvas.offsetWidth;H=canvas.offsetHeight;
    canvas.width=W;canvas.height=H;
  }
  resize();
  new ResizeObserver(resize).observe(canvas);

  // ── Physics constants ──
  const AW=50,AL=70,AH=18;   // arena half-widths
  const GW=10,GH=7;           // goal width/height
  const BALL_R=1.1;
  const G=0.014;
  const MAX_SPD=0.28,BOOST_SPD=0.52,TURN=0.048,FRIC=0.84,AFRIC=0.975;
  const BDRAIN=2.2,BREGEN=0.35;
  const JVY=0.22,DJ_VY=0.28;

  // ── Game state ──
  let running=false,gameTime=120,scoreP=0,scoreAI=0;
  let celebrating=false,celebMsg='',celebTimer=0;
  let timerInt=null,animId=null,keys={},lastT=0,acc=0;
  const STEP=1/120;

  function makeCar(x,z,ry){return{x,y:0.9,z,vx:0,vy:0,vz:0,ry,boost:100,onGround:true,boosting:false,jumps:2,jcd:0};}
  let car=makeCar(-3,AL/2-10,0);
  let aiCar=makeCar(3,-AL/2+10,Math.PI);
  let ball={x:0,y:2,z:0,vx:0,vy:0,vz:0};

  // ── Camera ──
  let camYaw=0,camYawOff=0;
  let camX=0,camY=12,camZ=25; // smooth camera pos
  const FOV=520; // perspective divisor

  // ── Key handlers ──
  function kd(e){
    keys[e.code]=true;
    if(e.code===RS3_KEYS.reset) resetBall();
    if(e.code===RS3_KEYS.jump) tryJump();
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  }
  function ku(e){keys[e.code]=false;}
  document.addEventListener('keydown',kd);
  document.addEventListener('keyup',ku);

  function cleanup(){
    running=false;cancelAnimationFrame(animId);clearInterval(timerInt);
    document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);
    const s=document.getElementById('rs3settModal');if(s)s.remove();
  }

  function resetBall(){ball={x:0,y:3,z:0,vx:(Math.random()-.5)*0.12,vy:0.05,vz:(Math.random()-.5)*0.12};}
  function reset(){
    car=makeCar(-3,AL/2-10,0);
    aiCar=makeCar(3,-AL/2+10,Math.PI);
    resetBall();celebrating=false;
  }

  function tryJump(){
    if(car.jcd>0)return;
    if(car.onGround){car.vy=JVY;car.onGround=false;car.jumps=1;car.jcd=8;}
    else if(car.jumps>0){car.vy=DJ_VY;car.jumps=0;car.jcd=8;}
  }

  // ── Physics ──
  function updateCar(c,fwd,turn,boost,ai){
    if(ai){
      const dx=ball.x-c.x,dz=ball.z-c.z,dist=Math.sqrt(dx*dx+dz*dz);
      const ta=Math.atan2(dx,dz);let da=ta-c.ry;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      c.ry+=Math.sign(da)*Math.min(Math.abs(da),TURN*0.85);
      fwd=dist>1.5?1:0;boost=c.boost>15&&dist>8;
      c.vx+=Math.sin(c.ry)*fwd*(boost?BOOST_SPD:MAX_SPD)*0.045;
      c.vz+=Math.cos(c.ry)*fwd*(boost?BOOST_SPD:MAX_SPD)*0.045;
    } else {
      if(c.onGround)c.ry+=turn*TURN;else c.ry+=turn*TURN*0.3;
      const sp=boost?BOOST_SPD:MAX_SPD;
      c.vx+=Math.sin(c.ry)*fwd*sp*0.055;
      c.vz+=Math.cos(c.ry)*fwd*sp*0.055;
      const s=Math.sqrt(c.vx*c.vx+c.vz*c.vz);
      if(s>sp*1.5){c.vx*=sp*1.5/s;c.vz*=sp*1.5/s;}
    }
    if(boost&&c.boost>0){c.boost=Math.max(0,c.boost-BDRAIN);c.boosting=true;}
    else{c.boost=Math.min(100,c.boost+BREGEN);c.boosting=false;}
    c.vy-=G;
    c.vx*=c.onGround?FRIC:AFRIC;c.vz*=c.onGround?FRIC:AFRIC;
    c.x+=c.vx;c.y+=c.vy;c.z+=c.vz;
    if(c.y<=0.9){c.y=0.9;c.vy=0;c.onGround=true;c.jumps=2;if(c.jcd>0)c.jcd--;}
    else{c.onGround=false;if(c.jcd>0)c.jcd--;}
    if(c.y>AH-1){c.y=AH-1;c.vy=0;}
    c.x=Math.max(-AW/2+1.8,Math.min(AW/2-1.8,c.x));
    c.z=Math.max(-AL/2+3,Math.min(AL/2-3,c.z));
  }

  function ballCarHit(c){
    const dx=ball.x-c.x,dy=ball.y-c.y,dz=ball.z-c.z;
    const dist=Math.sqrt(dx*dx+dy*dy*0.5+dz*dz);
    const hr=BALL_R+2.2;
    if(dist<hr&&dist>0.01){
      const nx=dx/dist,ny=dy/dist*0.5,nz=dz/dist;
      const sp=Math.sqrt(c.vx*c.vx+c.vz*c.vz);
      const imp=Math.max(3,sp*5)+(c.boosting?3:0);
      ball.vx=nx*imp+c.vx*0.6;ball.vy=Math.abs(ny)*imp*0.6+Math.abs(c.vy)+1.5;ball.vz=nz*imp+c.vz*0.6;
      ball.x=c.x+nx*hr;ball.y=c.y+ny*hr;ball.z=c.z+nz*hr;
    }
  }

  function physicsStep(){
    if(!running||celebrating)return;
    const fwd=keys[RS3_KEYS.forward]?1:keys[RS3_KEYS.back]?-1:0;
    const turn=keys[RS3_KEYS.left]?-1:keys[RS3_KEYS.right]?1:0;
    const boost=keys[RS3_KEYS.boost]&&car.boost>0;
    updateCar(car,fwd,turn,boost,false);
    updateCar(aiCar,0,0,false,true);

    ball.vy-=G*1.1;ball.vx*=0.978;ball.vz*=0.978;
    ball.x+=ball.vx;ball.y+=ball.vy;ball.z+=ball.vz;
    if(ball.y<=BALL_R){ball.y=BALL_R;ball.vy*=-0.38;ball.vx*=0.78;ball.vz*=0.78;if(Math.abs(ball.vy)<0.04)ball.vy=0;}
    if(ball.y>=AH-BALL_R){ball.y=AH-BALL_R;ball.vy*=-0.35;}
    if(Math.abs(ball.x)>=AW/2-BALL_R){ball.x=Math.sign(ball.x)*(AW/2-BALL_R);ball.vx*=-0.42;}
    if(ball.z<=-AL/2+BALL_R){
      if(Math.abs(ball.x)<GW/2&&ball.y<GH){
        scoreP++;document.getElementById('rs3-score').textContent=`${scoreP} — ${scoreAI}`;
        doGoal('🔴 YOU SCORED! +5🪙');if(!infCoins){coins+=5;localStorage.setItem('obbyCoins',coins);updCoins();}
      }else{ball.z=-AL/2+BALL_R;ball.vz*=-0.42;}
    }
    if(ball.z>=AL/2-BALL_R){
      if(Math.abs(ball.x)<GW/2&&ball.y<GH){
        scoreAI++;document.getElementById('rs3-score').textContent=`${scoreP} — ${scoreAI}`;
        doGoal('💀 CPU SCORED!');
      }else{ball.z=AL/2-BALL_R;ball.vz*=-0.42;}
    }
    ballCarHit(car);ballCarHit(aiCar);
    // Boost pads
    [[-15,0],[15,0],[0,20],[0,-20],[-15,20],[15,20],[-15,-20],[15,-20],[0,0]].forEach(([px,pz])=>{
      if(Math.hypot(car.x-px,car.z-pz)<2.5)car.boost=100;
      if(Math.hypot(aiCar.x-px,aiCar.z-pz)<2.5)aiCar.boost=100;
    });
    const bd=document.getElementById('rs3-boost');if(bd)bd.style.width=car.boost+'%';
    const jd=document.getElementById('rs3-jumps');if(jd)jd.textContent='JUMPS: '+(car.jumps>0?'●'.repeat(car.jumps)+'○'.repeat(2-car.jumps):'○○');
  }

  function doGoal(msg){
    celebrating=true;celebMsg=msg;
    setTimeout(()=>{celebrating=false;reset();},2600);
  }

  // ── 3D Projection ──
  // Camera looks in the -Z direction in camera space.
  // camYaw rotates the world around Y so we look behind the player car.
  let smoothCamX=-3,smoothCamZ=AL/2-10+22,smoothLX=0,smoothLZ=0;

  function project(wx,wy,wz){
    // Translate world point relative to camera
    const dx=wx-camX, dy=wy-camY, dz=wz-camZ;
    // Rotate around Y by -camYaw so camera faces -Z
    const cosY=Math.cos(-camYaw), sinY=Math.sin(-camYaw);
    const rx= dx*cosY + dz*sinY;
    const ry= dy;
    const rz=-dx*sinY + dz*cosY;
    // Apply a slight downward pitch (~20 degrees) so we look at the field
    const pitch=0.35; // radians down
    const cosp=Math.cos(pitch), sinp=Math.sin(pitch);
    const py= ry*cosp - rz*sinp;
    const pz= ry*sinp + rz*cosp;
    if(pz>=0)return null; // behind or on camera plane
    const depth=-pz;
    const scale=FOV/depth;
    return{
      sx: W/2 + rx*scale,
      sy: H/2 - py*scale,
      scale,
      depth
    };
  }

  function projectPt(x,y,z){return project(x,y,z);}

  function drawLine3D(x1,y1,z1,x2,y2,z2,color,width=1,alpha=1){
    const p1=projectPt(x1,y1,z1),p2=projectPt(x2,y2,z2);
    if(!p1||!p2)return;
    ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;
    ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.stroke();ctx.restore();
  }

  function drawRect3D(corners,fillColor,alpha=1){
    const pts=corners.map(c=>projectPt(c[0],c[1],c[2]));
    if(pts.some(p=>!p))return;
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=fillColor;
    ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].sx,pts[i].sy);
    ctx.closePath();ctx.fill();ctx.restore();
  }

  // ── Draw functions ──
  function drawArena(){
    // Sky
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#040810');sky.addColorStop(1,'#0a1628');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

    // Floor tiles
    const stripeColors=['#162816','#122012'];
    for(let zi=-AL/2;zi<AL/2;zi+=AL/14){
      const sc=stripeColors[Math.floor((zi+AL/2)/(AL/14))%2];
      drawRect3D([
        [-AW/2,0,zi],[ AW/2,0,zi],
        [ AW/2,0,zi+AL/14],[-AW/2,0,zi+AL/14]
      ],sc,1);
    }

    // Field lines
    drawLine3D(-AW/2,0.05,0,AW/2,0.05,0,'rgba(255,255,255,.25)',1.5);
    // Center circle (drawn as segments)
    for(let i=0;i<32;i++){
      const a1=i/32*Math.PI*2,a2=(i+1)/32*Math.PI*2;
      drawLine3D(Math.cos(a1)*8,0.05,Math.sin(a1)*8,Math.cos(a2)*8,0.05,Math.sin(a2)*8,'rgba(255,255,255,.2)',1);
    }
    // Border lines
    drawLine3D(-AW/2,0.05,-AL/2,AW/2,0.05,-AL/2,'rgba(255,255,255,.4)',2);
    drawLine3D(-AW/2,0.05, AL/2,AW/2,0.05, AL/2,'rgba(255,255,255,.4)',2);
    drawLine3D(-AW/2,0.05,-AL/2,-AW/2,0.05,AL/2,'rgba(255,255,255,.4)',2);
    drawLine3D( AW/2,0.05,-AL/2, AW/2,0.05,AL/2,'rgba(255,255,255,.4)',2);

    // Boost pads
    [[-15,0],[15,0],[0,20],[0,-20],[-15,20],[15,20],[-15,-20],[15,-20],[0,0]].forEach(([px,pz])=>{
      const p=projectPt(px,0.1,pz);if(!p)return;
      const r=Math.max(2,p.scale*1.2);
      ctx.save();ctx.globalAlpha=0.85;
      const g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*2);
      g.addColorStop(0,'#fff8b0');g.addColorStop(0.4,'#fbbf24');g.addColorStop(1,'rgba(251,191,36,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.sx,p.sy,r*2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(p.sx,p.sy,r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
  }

  function drawWalls(){
    const wa=0.08;
    // Side walls (X boundaries)
    drawRect3D([[-AW/2,0,-AL/2],[-AW/2,AH,-AL/2],[-AW/2,AH,AL/2],[-AW/2,0,AL/2]],'rgba(30,60,120,.15)',wa);
    drawRect3D([[AW/2,0,-AL/2],[AW/2,AH,-AL/2],[AW/2,AH,AL/2],[AW/2,0,AL/2]],'rgba(30,60,120,.15)',wa);
    // End walls with goal holes
    // Back wall (z=-AL/2) - draw 3 panels: left, right, top
    drawRect3D([[-AW/2,0,-AL/2],[-GW/2,0,-AL/2],[-GW/2,AH,-AL/2],[-AW/2,AH,-AL/2]],'rgba(30,50,100,.12)',wa);
    drawRect3D([[GW/2,0,-AL/2],[AW/2,0,-AL/2],[AW/2,AH,-AL/2],[GW/2,AH,-AL/2]],'rgba(30,50,100,.12)',wa);
    drawRect3D([[-GW/2,GH,-AL/2],[GW/2,GH,-AL/2],[GW/2,AH,-AL/2],[-GW/2,AH,-AL/2]],'rgba(30,50,100,.12)',wa);
    // Front wall (z=AL/2)
    drawRect3D([[-AW/2,0,AL/2],[-GW/2,0,AL/2],[-GW/2,AH,AL/2],[-AW/2,AH,AL/2]],'rgba(30,50,100,.12)',wa);
    drawRect3D([[GW/2,0,AL/2],[AW/2,0,AL/2],[AW/2,AH,AL/2],[GW/2,AH,AL/2]],'rgba(30,50,100,.12)',wa);
    drawRect3D([[-GW/2,GH,AL/2],[GW/2,GH,AL/2],[GW/2,AH,AL/2],[-GW/2,AH,AL/2]],'rgba(30,50,100,.12)',wa);
  }

  function drawGoal(z,color){
    const d=z<0?-3:3; // net depth direction
    // Posts
    drawLine3D(-GW/2,0,z,-GW/2,GH,z,color,3,0.9);
    drawLine3D( GW/2,0,z, GW/2,GH,z,color,3,0.9);
    // Crossbar
    drawLine3D(-GW/2,GH,z,GW/2,GH,z,color,3,0.9);
    // Net verticals
    for(let i=0;i<=8;i++){
      const xp=-GW/2+i*GW/8;
      drawLine3D(xp,0,z,xp,GH,z+d,color,0.8,0.2);
      drawLine3D(xp,GH,z,xp,GH,z+d,color,0.8,0.2);
    }
    // Net horizontals
    for(let j=0;j<=5;j++){
      const yp=j*GH/5;
      drawLine3D(-GW/2,yp,z+d,GW/2,yp,z+d,color,0.8,0.2);
    }
    // Goal glow on ground
    const p=projectPt(0,0.1,z);if(p){
      ctx.save();ctx.globalAlpha=0.15;
      const g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,p.scale*GW);
      g.addColorStop(0,color);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.sx,p.sy,p.scale*GW,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  function drawBall(){
    const p=projectPt(ball.x,ball.y,ball.z);if(!p)return;
    const r=Math.max(2,BALL_R*p.scale);
    // Shadow on floor
    const ps=projectPt(ball.x,0,ball.z);
    if(ps){
      const dist=Math.max(0.1,ball.y);
      ctx.save();ctx.globalAlpha=0.35/dist;
      ctx.fillStyle='rgba(0,0,0,.8)';
      ctx.beginPath();ctx.ellipse(ps.sx,ps.sy,r*1.2/dist,r*0.4/dist,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    // Glow
    ctx.save();
    const g=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*2.5);
    g.addColorStop(0,'rgba(255,255,255,.4)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(p.sx,p.sy,r*2.5,0,Math.PI*2);ctx.fill();
    // Ball body
    const bg=ctx.createRadialGradient(p.sx-r*0.3,p.sy-r*0.3,r*0.1,p.sx,p.sy,r);
    bg.addColorStop(0,'#ffffff');bg.addColorStop(0.5,'#dddddd');bg.addColorStop(1,'#888888');
    ctx.globalAlpha=1;ctx.fillStyle=bg;ctx.beginPath();ctx.arc(p.sx,p.sy,r,0,Math.PI*2);ctx.fill();
    // Panel lines
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=r*0.12;
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2;
      ctx.beginPath();ctx.moveTo(p.sx+Math.cos(a)*r*0.3,p.sy+Math.sin(a)*r*0.3);
      ctx.lineTo(p.sx+Math.cos(a)*r,p.sy+Math.sin(a)*r);ctx.stroke();
    }
    ctx.restore();
  }

  function drawCar(c,color,glowColor){
    // Car body as a projected box
    const hw=1.8,hl=3.0,hh=0.9;
    const cy=Math.cos(c.ry),sy2=Math.sin(c.ry);
    // 8 corners of car box
    function corner(sx,sy3,sz){
      return[c.x+sx*cy+sz*sy2, c.y+sy3, c.z-sx*sy2+sz*cy];
    }
    const corners={
      fbl:corner(-hw,0,hl),fbr:corner(hw,0,hl),
      ftl:corner(-hw,hh*2,hl),ftr:corner(hw,hh*2,hl),
      bbl:corner(-hw,0,-hl),bbr:corner(hw,0,-hl),
      btl:corner(-hw,hh*2,-hl),btr:corner(hw,hh*2,-hl),
    };
    // Draw faces back-to-front (simple)
    const faces=[
      {pts:[corners.bbl,corners.bbr,corners.btr,corners.btl],bright:0.6},// back
      {pts:[corners.fbl,corners.fbr,corners.ftr,corners.ftl],bright:1.0},// front
      {pts:[corners.bbl,corners.fbl,corners.ftl,corners.btl],bright:0.7},// left
      {pts:[corners.bbr,corners.fbr,corners.ftr,corners.btr],bright:0.7},// right
      {pts:[corners.ftl,corners.ftr,corners.btr,corners.btl],bright:0.9},// top
    ];
    faces.forEach(f=>{
      const projs=f.pts.map(p=>projectPt(p[0],p[1],p[2]));
      if(projs.some(p=>!p))return;
      ctx.save();
      // Parse color and adjust brightness
      ctx.globalAlpha=0.92;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(projs[0].sx,projs[0].sy);
      projs.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));
      ctx.closePath();ctx.fill();
      // Darken non-front faces
      if(f.bright<1){ctx.fillStyle=`rgba(0,0,0,${1-f.bright})`;ctx.fill();}
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    });
    // Windshield
    const wf=faces[1];
    if(wf){
      const wp=wf.pts.map(p=>projectPt(p[0],p[1]+0.1,p[2]));
      if(!wp.some(p=>!p)){
        ctx.save();ctx.globalAlpha=0.35;ctx.fillStyle='#99ccff';
        ctx.beginPath();ctx.moveTo(wp[0].sx,wp[0].sy);wp.slice(1).forEach(p=>ctx.lineTo(p.sx,p.sy));
        ctx.closePath();ctx.fill();ctx.restore();
      }
    }
    // Boost flame
    if(c.boosting&&c.boost>0){
      const flamePt=projectPt(c.x-cy*hl*1.2,c.y+hh,c.z+sy2*hl*1.2);
      if(flamePt){
        ctx.save();
        const fg=ctx.createRadialGradient(flamePt.sx,flamePt.sy,0,flamePt.sx,flamePt.sy,flamePt.scale*2.5);
        fg.addColorStop(0,'#fff8b0');fg.addColorStop(0.4,'#fbbf24');fg.addColorStop(1,'transparent');
        ctx.fillStyle=fg;ctx.globalAlpha=0.9;
        ctx.beginPath();ctx.arc(flamePt.sx,flamePt.sy,flamePt.scale*2.5,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }
    // Car shadow
    const sp=projectPt(c.x,0.01,c.z);
    if(sp){ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.ellipse(sp.sx,sp.sy,sp.scale*hw*1.5,sp.scale*0.5,0,0,Math.PI*2);ctx.fill();ctx.restore();}
    // Headlight glow
    const hlPt=projectPt(c.x+cy*hl,c.y+hh,c.z-sy2*hl);
    if(hlPt){
      ctx.save();ctx.globalAlpha=0.5;
      const hg=ctx.createRadialGradient(hlPt.sx,hlPt.sy,0,hlPt.sx,hlPt.sy,hlPt.scale*1.5);
      hg.addColorStop(0,glowColor);hg.addColorStop(1,'transparent');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(hlPt.sx,hlPt.sy,hlPt.scale*1.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // ── Main render ──
  function render(){
    if(!W||!H)return;
    ctx.clearRect(0,0,W,H);

    // Update camera — sit behind car, look toward arena center
    if(keys[RS3_KEYS.camLeft])camYawOff-=0.018;
    if(keys[RS3_KEYS.camRight])camYawOff+=0.018;
    camYawOff*=0.96;
    camYaw=car.ry+Math.PI+camYawOff; // +PI so camera is behind the car

    // Camera position: behind car by 22 units, up 9 units
    const idealCX=car.x + Math.sin(camYaw)*22;
    const idealCZ=car.z + Math.cos(camYaw)*22;
    smoothCamX+=(idealCX-smoothCamX)*0.07;
    smoothCamZ+=(idealCZ-smoothCamZ)*0.07;
    camX=smoothCamX; camY=car.y+9; camZ=smoothCamZ;

    // Draw scene
    drawArena();
    drawWalls();
    drawGoal(-AL/2,'#f87171'); // player scores here
    drawGoal( AL/2,'#60a5fa'); // AI scores here

    // Sort objects by depth for painter's algorithm
    const objs=[
      {type:'car',c:aiCar,color:'#3b82f6',glow:'#6699ff'},
      {type:'car',c:car,color:'#ef4444',glow:'#ff6666'},
      {type:'ball'},
    ].sort((a,b)=>{
      const da=a.type==='ball'?Math.sqrt((ball.x-camX)**2+(ball.z-camZ)**2):Math.sqrt((a.c.x-camX)**2+(a.c.z-camZ)**2);
      const db=b.type==='ball'?Math.sqrt((ball.x-camX)**2+(ball.z-camZ)**2):Math.sqrt((b.c.x-camX)**2+(b.c.z-camZ)**2);
      return db-da;
    });
    objs.forEach(o=>{
      if(o.type==='ball') drawBall();
      else drawCar(o.c,o.color,o.glow);
    });

    // Celebration overlay
    if(celebrating){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
      ctx.save();ctx.textAlign='center';
      ctx.fillStyle='#a3e635';ctx.font=`bold ${Math.round(W/12)}px Nunito`;
      ctx.fillText(celebMsg,W/2,H/2);
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=`bold ${Math.round(W/20)}px Nunito`;
      ctx.fillText(`${scoreP} — ${scoreAI}`,W/2,H/2+W/11);
      ctx.restore();
    } else if(!running){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
      ctx.save();ctx.textAlign='center';
      ctx.fillStyle='#a3e635';ctx.font=`bold ${Math.round(W/16)}px Nunito`;
      ctx.fillText('▶ Press KICK OFF to play!',W/2,H/2-10);
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`bold ${Math.round(W/36)}px Nunito`;
      ctx.fillText('WASD = Drive   Space = Jump / Boost   Q/E = Camera',W/2,H/2+30);
      ctx.restore();
    }
  }

  // ── Game loop ──
  function loop(ts){
    animId=requestAnimationFrame(loop);
    const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
    acc+=dt;let steps=0;
    while(acc>=STEP&&steps<4){physicsStep();acc-=STEP;steps++;}
    render();
  }

  kickBtn.onclick=()=>{
    if(running){running=false;clearInterval(timerInt);kickBtn.textContent='▶ KICK OFF';return;}
    scoreP=0;scoreAI=0;gameTime=120;
    document.getElementById('rs3-score').textContent='0 — 0';
    document.getElementById('rs3-timer').textContent='2:00';
    reset();running=true;kickBtn.textContent='⏸ PAUSE';
    clearInterval(timerInt);
    timerInt=setInterval(()=>{
      if(!running||celebrating)return;
      gameTime--;
      const m=Math.floor(gameTime/60),s=gameTime%60;
      document.getElementById('rs3-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
      if(gameTime<=0){
        running=false;clearInterval(timerInt);
        const w=scoreP>scoreAI?'🏆 YOU WIN!':scoreP<scoreAI?'💀 CPU WINS!':'🤝 DRAW!';
        celebrating=true;celebMsg=w;
        if(scoreP>scoreAI&&!infCoins){coins+=60;localStorage.setItem('obbyCoins',coins);updCoins();}
        kickBtn.textContent='🔁 PLAY AGAIN';
      }
    },1000);
  };

  lastT=performance.now();
  requestAnimationFrame(loop);
}

  };

  // ── Map generation ──
  let map=[];
  function genMap(){
    map=[];
    for(let y=0;y<MAPH;y++){
      map[y]=[];
      for(let x=0;x<MAPW;x++){
        // Border walls
        if(x===0||y===0||x===MAPW-1||y===MAPH-1){map[y][x]=1;continue;}
        // Random interior walls (avoid center player spawn)
        const cx=Math.abs(x-MAPW/2),cy2=Math.abs(y-MAPH/2);
        map[y][x]=(cx>3||cy2>3)&&Math.random()<0.12?1:0;
      }
    }
    // Clear spawn area
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)map[Math.floor(MAPH/2)+dy][Math.floor(MAPW/2)+dx]=0;
  }
  genMap();

  function tileAt(wx,wy){
    const tx=Math.floor(wx/TILE),ty=Math.floor(wy/TILE);
    if(tx<0||ty<0||tx>=MAPW||ty>=MAPH)return 1;

  }
  function solid(wx,wy){return tileAt(wx,wy)===1;}

  // ── Player ──

    wave++;
    document.getElementById('zr-wave').textContent='WAVE '+wave;
    const count=5+wave*3;
    waveZombiesLeft=count;
    waveKills=0;

    // Spawn in batches around edges/far from player
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const type=pickZombieType();
        spawnZombie(type);
      },i*300);
    }

    // Boss every 5 waves
    if(wave%5===0){
      setTimeout(()=>spawnZombie('boss'),count*300+500);
      waveZombiesLeft++;
      showFloatText(MW/2,MH/2,'⚠️ BOSS INCOMING!','#dc2626',2.5);
    }

    // Weapon drop hint on wave 2
    if(wave===2) showFloatText(player.x,player.y-30,'Grab weapon pickups!','#facc15',2);
  }

  function pickZombieType(){
    if(wave<=1)return'walker';
    const r=Math.random();
    if(wave>=5&&r<0.05)return'boss';
    if(wave>=3&&r<0.15)return'tank';
    if(wave>=2&&r<0.25)return'runner';
    if(wave>=2&&r<0.40)return'spitter';
    return'walker';
  }

  function spawnZombie(type){
    const t=ZOMBIE_TYPES[type];
    // Spawn far from player
    let sx,sy,attempts=0;
    do{
      const edge=Math.floor(Math.random()*4);
      if(edge===0){sx=Math.random()*MW;sy=TILE*2;}
      else if(edge===1){sx=Math.random()*MW;sy=MH-TILE*2;}
      else if(edge===2){sx=TILE*2;sy=Math.random()*MH;}
      else{sx=MW-TILE*2;sy=Math.random()*MH;}
      attempts++;
    }while(solid(sx,sy)&&attempts<20);
    zombies.push({
      x:sx,y:sy,type,
      hp:t.hp*(1+wave*0.1),maxHp:t.hp*(1+wave*0.1),
      spd:t.spd*(1+wave*0.03),
      dmg:t.dmg,r:t.r,color:t.color,outline:t.outline,
      score:t.score,boss:!!t.boss,ranged:!!t.ranged,
      shootCooldown:Math.random()*80,
      hitFlash:0,angle:0,wobble:0,
      path:{tx:sx,ty:sy,timer:0},
    });
  }

  // ── Shoot ──
  function shoot(){
    const w=WEAPONS[player.weapon];
    if(player.fireCooldown>0)return;
    const curAmmo=player.ammos[player.weapon];
    if(curAmmo!==Infinity&&curAmmo<=0){
      showFloatText(player.x,player.y-30,'EMPTY! Press R','#f87171',1);
      return;
    }
    const dx=mouseX-(W/2),dy=mouseY-(H/2);
    const baseAngle=Math.atan2(dy,dx);
    for(let b=0;b<w.bullets;b++){
      const ang=baseAngle+(Math.random()-0.5)*w.spread*2;
      bullets.push({
        x:player.x,y:player.y,
        vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,
        dmg:w.dmg,color:w.color,
        life:55,r:w.splash||0,
        fromPlayer:true,
      });
    }
    if(curAmmo!==Infinity) player.ammos[player.weapon]=Math.max(0,curAmmo-1);
    player.fireCooldown=w.rate;
    updateAmmoHud();
    // Muzzle flash particles
    for(let i=0;i<5;i++) spawnParticle(player.x,player.y,'#fff',1.5+Math.random()*2,Math.random()*Math.PI*2,3+Math.random()*3);
  }

  function updateAmmoHud(){
    const w=WEAPONS[player.weapon];
    const a=player.ammos[player.weapon];
    document.getElementById('zr-ammo').textContent='🔫 '+(a===Infinity?'∞':a);
    document.getElementById('zr-weapon-box').textContent=w.name;
    document.getElementById('zr-weapon-box').style.borderColor=w.color;
    document.getElementById('zr-weapon-box').style.color=w.color;
  }

  // ── Dash ──
  function doDash(){
    if(player.dashCooldown>0||player.dashTimer>0)return;
    let dx=0,dy=0;
    if(keys2['KeyW']||keys2['ArrowUp'])dy=-1;
    if(keys2['KeyS']||keys2['ArrowDown'])dy=1;
    if(keys2['KeyA']||keys2['ArrowLeft'])dx=-1;
    if(keys2['KeyD']||keys2['ArrowRight'])dx=1;
    if(dx===0&&dy===0){const ang=Math.atan2(mouseY-H/2,mouseX-W/2);dx=Math.cos(ang);dy=Math.sin(ang);}
    const len=Math.sqrt(dx*dx+dy*dy);
    player.dashDx=dx/len;player.dashDy=dy/len;
    player.dashTimer=12;player.dashCooldown=60;player.invincible=14;
    for(let i=0;i<10;i++) spawnParticle(player.x,player.y,'#38bdf8',2,Math.random()*Math.PI*2,2+Math.random()*3);
    document.getElementById('zr-dash').style.color='rgba(56,189,248,.3)';
    document.getElementById('zr-dash').style.borderColor='rgba(56,189,248,.3)';
  }

  // ── Pickups ──
  const PICKUP_TYPES=['shotgun','uzi','sniper','rocket','health','ammo'];
  function spawnPickup(x,y,type){
    if(!type) type=PICKUP_TYPES[Math.floor(Math.random()*PICKUP_TYPES.length)];
    pickups.push({x,y,type,life:600,pulse:0});
  }

  function tryPickup(){
    for(let i=pickups.length-1;i>=0;i--){
      const p=pickups[i];
      if(Math.hypot(player.x-p.x,player.y-p.y)<28){
        if(p.type==='health'){
          player.hp=Math.min(player.maxHp,player.hp+40);
          showFloatText(p.x,p.y-20,'+40 HP','#4ade80',1.2);
          updateHpHud();
        } else if(p.type==='ammo'){
          const w=WEAPONS[player.weapon];
          if(player.ammos[player.weapon]!==Infinity){
            player.ammos[player.weapon]=Math.min(player.ammos[player.weapon]+20,99);
            showFloatText(p.x,p.y-20,'+20 Ammo','#38bdf8',1.2);
          }
          updateAmmoHud();
        } else {
          player.weapon=p.type;
          showFloatText(p.x,p.y-20,'Got '+WEAPONS[p.type].name+'!',WEAPONS[p.type].color,1.5);
          updateAmmoHud();
        }
        for(let j=0;j<8;j++) spawnParticle(p.x,p.y,'#facc15',2,j/8*Math.PI*2,3);
        pickups.splice(i,1);
      }
    }
  }

  // ── Particles ──
  function spawnParticle(x,y,color,size,angle,speed,life=30){
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color,size,life,maxLife:life});
  }
  function spawnBlood(x,y,count=8){
    for(let i=0;i<count;i++) spawnParticle(x,y,`hsl(${120+Math.random()*40},90%,${30+Math.random()*30}%)`,2+Math.random()*3,Math.random()*Math.PI*2,1+Math.random()*4,40);
  }

  // ── Float texts ──
  function showFloatText(x,y,text,color,dur=1){
    floatTexts.push({x,y,text,color,life:dur*60,maxLife:dur*60});
  }

  function updateHpHud(){
    const pct=Math.max(0,player.hp/player.maxHp*100);
    const bar=document.getElementById('zr-hp');if(bar){
      bar.style.width=pct+'%';
      bar.style.background=pct>50?'linear-gradient(90deg,#4ade80,#16a34a)':pct>25?'linear-gradient(90deg,#facc15,#ca8a04)':'linear-gradient(90deg,#f87171,#dc2626)';
    }
  }

  // ── Key / mouse handlers ──
  function kd2(e){
    keys2[e.code]=true;
    if(e.code==='ShiftLeft'||e.code==='ShiftRight') doDash();
    if(e.code==='KeyR'){
      const w=WEAPONS[player.weapon];
      if(player.ammos[player.weapon]!==Infinity){
        player.ammos[player.weapon]=Math.min(w.ammo||30,player.ammos[player.weapon]+10);
        showFloatText(player.x,player.y-30,'Reloaded!','#38bdf8',1);
        updateAmmoHud();
      }
    }
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  }
  function ku2(e){keys2[e.code]=false;}
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
  canvas.addEventListener('click',()=>{if(gameStarted&&!gameOver)shoot();});
  canvas.addEventListener('mousedown',e=>{if(e.button===0&&WEAPONS[player.weapon].auto){autoFire=true;}});
  canvas.addEventListener('mouseup',e=>{if(e.button===0)autoFire=false;});
  document.addEventListener('keydown',kd2);
  document.addEventListener('keyup',ku2);
  let autoFire=false;

  function cleanup(){
    cancelAnimationFrame(animId);
    document.removeEventListener('keydown',kd2);
    document.removeEventListener('keyup',ku2);
  }

  // ── Camera (follows player) ──
  let camX2=0,camY2=0;

  // ── Update ──
  function update(){
    if(!gameStarted||gameOver)return;

    // ── Player movement ──
    let mvx=0,mvy=0;
    if(keys2['KeyW']||keys2['ArrowUp'])mvy=-1;
    if(keys2['KeyS']||keys2['ArrowDown'])mvy=1;
    if(keys2['KeyA']||keys2['ArrowLeft'])mvx=-1;
    if(keys2['KeyD']||keys2['ArrowRight'])mvx=1;

    if(player.dashTimer>0){
      mvx=player.dashDx*8;mvy=player.dashDy*8;player.dashTimer--;
    } else if(mvx!==0&&mvy!==0){mvx*=0.707;mvy*=0.707;}

    const spd=player.dashTimer>0?9:player.spd;
    const nx=player.x+mvx*spd,ny=player.y+mvy*spd;
    const pr=10;
    if(!solid(nx-pr,player.y-pr)&&!solid(nx+pr,player.y-pr)&&!solid(nx-pr,player.y+pr)&&!solid(nx+pr,player.y+pr)) player.x=nx;
    if(!solid(player.x-pr,ny-pr)&&!solid(player.x+pr,ny-pr)&&!solid(player.x-pr,ny+pr)&&!solid(player.x+pr,ny+pr)) player.y=ny;
    player.x=Math.max(TILE,Math.min(MW-TILE,player.x));
    player.y=Math.max(TILE,Math.min(MH-TILE,player.y));

    // Auto fire
    if(autoFire&&WEAPONS[player.weapon].auto) shoot();

    // Cooldowns
    if(player.fireCooldown>0)player.fireCooldown--;
    if(player.dashCooldown>0){
      player.dashCooldown--;
      if(player.dashCooldown===0){
        document.getElementById('zr-dash').style.color='#38bdf8';
        document.getElementById('zr-dash').style.borderColor='#38bdf8';
      }
    }
    if(player.invincible>0)player.invincible--;

    // ── Bullets ──
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i];
      b.x+=b.vx;b.y+=b.vy;b.life--;
      if(b.life<=0||solid(b.x,b.y)){
        if(b.r>0) splashDamage(b.x,b.y,b.r*TILE,b.dmg);
        spawnParticle(b.x,b.y,b.color,3,0,0,10);
        bullets.splice(i,1);continue;
      }
      // Hit zombies
      if(b.fromPlayer){
        for(let j=zombies.length-1;j>=0;j--){
          const z=zombies[j];
          if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+4){
            hitZombie(z,j,b.dmg,b.x,b.y);
            if(b.r>0) splashDamage(b.x,b.y,b.r*TILE,b.dmg*0.5);
            spawnParticle(b.x,b.y,b.color,4,0,0,15);
            bullets.splice(i,1);break;
          }
        }
      } else {
        // Zombie bullet hits player
        if(Math.hypot(b.x-player.x,b.y-player.y)<16&&player.invincible===0){
          player.hp-=b.dmg;player.invincible=20;
          spawnBlood(player.x,player.y,5);
          updateHpHud();
          if(player.hp<=0) triggerGameOver();
          bullets.splice(i,1);
        }
      }
    }

    // ── Zombies ──
    for(let i=zombies.length-1;i>=0;i--){
      const z=zombies[i];
      z.hitFlash=Math.max(0,z.hitFlash-1);
      z.wobble+=0.18;

      // Pathfind: simple direct chase with wall avoidance
      const dx=player.x-z.x,dy=player.y-z.y,dist=Math.sqrt(dx*dx+dy*dy);
      let mvx2=dx/dist,mvy2=dy/dist;

      // Simple wall avoidance
      if(solid(z.x+mvx2*z.r,z.y+mvy2*z.r)){
        // Try sliding along X or Y
        if(!solid(z.x+mvx2*z.r,z.y)) {mvy2=0;}
        else if(!solid(z.x,z.y+mvy2*z.r)){mvx2=0;}
        else{mvx2=-mvx2;mvy2=-mvy2;}
      }
      z.angle=Math.atan2(dy,dx);

      if(dist>z.r+10){
        const znx=z.x+mvx2*z.spd,zny=z.y+mvy2*z.spd;
        if(!solid(znx,z.y)) z.x=znx;
        if(!solid(z.x,zny)) z.y=zny;
      }

      // Ranged attack
      if(z.ranged&&dist<300){
        z.shootCooldown--;
        if(z.shootCooldown<=0){
          z.shootCooldown=90+Math.random()*60;
          const ang=Math.atan2(player.y-z.y,player.x-z.x)+(Math.random()-.5)*0.3;
          bullets.push({x:z.x,y:z.y,vx:Math.cos(ang)*7,vy:Math.sin(ang)*7,dmg:z.dmg*0.6,color:'#a3e635',life:50,r:0,fromPlayer:false});
        }
      }

      // Boss special: charge attack
      if(z.boss&&dist<200&&Math.random()<0.005){
        z.spd=4;setTimeout(()=>{if(z)z.spd=ZOMBIE_TYPES.boss.spd*(1+wave*0.03);},800);
        for(let p2=0;p2<12;p2++) spawnParticle(z.x,z.y,'#dc2626',3,p2/12*Math.PI*2,3);
      }

      // Melee damage
      if(dist<z.r+14&&player.invincible===0){
        player.hp-=z.dmg*0.06;
        player.invincible=8;
        spawnBlood(player.x,player.y,3);
        updateHpHud();
        if(player.hp<=0){triggerGameOver();return;}
      }
    }

    // ── Pickups ──
    tryPickup();
    for(let i=pickups.length-1;i>=0;i--){pickups[i].life--;pickups[i].pulse+=0.1;if(pickups[i].life<=0)pickups.splice(i,1);}

    // ── Particles ──
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.life--;
      if(p.life<=0)particles.splice(i,1);
    }

    // ── Float texts ──
    for(let i=floatTexts.length-1;i>=0;i--){
      floatTexts[i].y-=0.7;floatTexts[i].life--;
      if(floatTexts[i].life<=0)floatTexts.splice(i,1);
    }

    // ── Wave management ──
    if(zombies.length===0&&waveZombiesLeft===0){
      waveTimer++;
      if(waveTimer===60){
        // Reward between waves
        const earn=wave*5;
        if(!infCoins){coins+=earn;localStorage.setItem('obbyCoins',coins);updCoins();}
        showFloatText(player.x,player.y-40,`+${earn} coins!`,'#facc15',2);
        // Spawn pickups as wave reward
        for(let i=0;i<2+Math.floor(wave/2);i++){
          const angle=i/3*Math.PI*2;
          spawnPickup(player.x+Math.cos(angle)*80,player.y+Math.sin(angle)*80);
        }
      }
      if(waveTimer>150){waveTimer=0;spawnWave();}
    }

    // Camera
    camX2+=(player.x-W/2-camX2)*0.1;
    camY2+=(player.y-H/2-camY2)*0.1;
    camX2=Math.max(0,Math.min(MW-W,camX2));
    camY2=Math.max(0,Math.min(MH-H,camY2));

    // Score display
    document.getElementById('zr-score').textContent=player.score+' pts';
  }

  function splashDamage(x,y,radius,dmg){
    for(let j=zombies.length-1;j>=0;j--){
      const z=zombies[j];
      if(Math.hypot(x-z.x,y-z.y)<radius) hitZombie(z,j,dmg*0.6,x,y);
    }
    for(let p2=0;p2<16;p2++) spawnParticle(x,y,'#f87171',3+Math.random()*3,p2/16*Math.PI*2,3+Math.random()*4);
  }

  function hitZombie(z,idx,dmg,bx,by){
    z.hp-=dmg;z.hitFlash=8;
    spawnBlood(z.x,z.y,6);
    showFloatText(z.x,z.y-z.r,'-'+Math.round(dmg),'#f87171',0.7);
    if(z.hp<=0){
      player.score+=z.score*(1+Math.floor(wave/5));
      // Chance to drop pickup
      if(Math.random()<0.18+wave*0.01) spawnPickup(z.x,z.y);
      for(let p2=0;p2<12;p2++) spawnBlood(z.x,z.y);
      showFloatText(z.x,z.y-30,'+'+z.score,'#facc15',1.2);
      zombies.splice(idx,1);
      waveKills++;waveZombiesLeft=Math.max(0,waveZombiesLeft-1);
    }
  }

  function triggerGameOver(){
    gameOver=true;
    const earn=Math.floor(player.score/10);
    if(!infCoins&&earn>0){coins+=earn;localStorage.setItem('obbyCoins',coins);updCoins();}
  }

  // ── Draw ──
  function draw(){
    if(!W||!H)return;
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(-camX2,-camY2);

    // ── Map ──
    for(let ty=0;ty<MAPH;ty++){
      for(let tx=0;tx<MAPW;tx++){
        const wx=tx*TILE,wy=ty*TILE;
        if(map[ty][tx]===1){
          ctx.fillStyle='#1c1917';ctx.fillRect(wx,wy,TILE,TILE);
          ctx.fillStyle='#292524';ctx.fillRect(wx+2,wy+2,TILE-4,TILE-4);
          // Wall detail
          ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
          ctx.strokeRect(wx+4,wy+4,TILE-8,TILE-8);
        } else {
          // Floor
          const shade=(tx+ty)%2===0?'#111810':'#0f1a0d';
          ctx.fillStyle=shade;ctx.fillRect(wx,wy,TILE,TILE);
          // Subtle grid
          ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=0.5;
          ctx.strokeRect(wx,wy,TILE,TILE);
        }
      }
    }

    // ── Pickups ──
    pickups.forEach(p=>{
      const pulse=Math.sin(p.pulse)*4;
      ctx.save();
      const icons={shotgun:'🔡',uzi:'⚡',sniper:'🎯',rocket:'🚀',health:'❤️',ammo:'📦'};
      const colors={shotgun:'#fb923c',uzi:'#facc15',sniper:'#c084fc',rocket:'#f87171',health:'#4ade80',ammo:'#38bdf8'};
      ctx.shadowBlur=12+pulse;ctx.shadowColor=colors[p.type]||'#fff';
      ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(icons[p.type]||'?',p.x,p.y+pulse*0.5);
      ctx.restore();
    });

    // ── Particles ──
    particles.forEach(p=>{
      ctx.save();ctx.globalAlpha=(p.life/p.maxLife)*0.9;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
      ctx.restore();
    });

    // ── Bullets ──
    bullets.forEach(b=>{
      ctx.save();
      ctx.shadowBlur=8;ctx.shadowColor=b.color;
      ctx.fillStyle=b.color;
      ctx.beginPath();ctx.arc(b.x,b.y,b.fromPlayer?4:3,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });

    // ── Zombies ──
    zombies.forEach(z=>{
      ctx.save();
      ctx.translate(z.x,z.y);
      ctx.rotate(z.angle+Math.PI/2);
      // Wobble walk
      const wb=Math.sin(z.wobble)*0.15;
      ctx.rotate(wb);
      // Body
      ctx.shadowBlur=z.boss?20:0;ctx.shadowColor='#dc2626';
      ctx.fillStyle=z.hitFlash>0?'#ffffff':z.color;
      ctx.strokeStyle=z.outline;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,z.r,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Face
      ctx.fillStyle='rgba(0,0,0,.5)';
      ctx.beginPath();ctx.arc(-z.r*0.28,-z.r*0.1,z.r*0.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc( z.r*0.28,-z.r*0.1,z.r*0.2,0,Math.PI*2);ctx.fill();
      // Mouth (jagged)
      ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-z.r*0.4,z.r*0.3);
      for(let i=0;i<=4;i++) ctx.lineTo(-z.r*0.4+i*z.r*0.2,z.r*0.3+(i%2)*z.r*0.15);
      ctx.stroke();
      // Boss crown
      if(z.boss){
        ctx.fillStyle='#facc15';
        ctx.font='bold 20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('👑',0,-z.r-10);
      }
      ctx.restore();
      // HP bar (only if damaged)
      if(z.hp<z.maxHp){
        const bw=z.r*2.5,bh=4,bx=z.x-bw/2,by=z.y-z.r-12;
        ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(bx,by,bw,bh);
        const pct=z.hp/z.maxHp;
        ctx.fillStyle=pct>0.5?'#4ade80':pct>0.25?'#facc15':'#f87171';
        ctx.fillRect(bx,by,bw*pct,bh);
      }
    });

    // ── Player ──
    const ang2=Math.atan2(mouseY+camY2-player.y,mouseX+camX2-player.x);
    ctx.save();
    ctx.translate(player.x,player.y);
    // Invincibility flash
    if(player.invincible>0&&Math.floor(player.invincible/3)%2===0){ctx.restore();}
    else {
      // Shadow
      ctx.shadowBlur=20;ctx.shadowColor='#3b82f6';
      // Body
      ctx.fillStyle='#3b82f6';ctx.strokeStyle='#93c5fd';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Direction indicator (gun)
      ctx.strokeStyle='#93c5fd';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(Math.cos(ang2)*8,Math.sin(ang2)*8);
      ctx.lineTo(Math.cos(ang2)*18,Math.sin(ang2)*18);ctx.stroke();
      // Eyes
      const ex=Math.cos(ang2)*5,ey=Math.sin(ang2)*5;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(ex+Math.cos(ang2+1.2)*4,ey+Math.sin(ang2+1.2)*4,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+Math.cos(ang2-1.2)*4,ey+Math.sin(ang2-1.2)*4,3,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // ── Dash trail ──
    if(player.dashTimer>0){
      for(let i=0;i<5;i++) spawnParticle(player.x-(player.dashDx*i*5),player.y-(player.dashDy*i*5),'#38bdf8',2,Math.random()*Math.PI*2,0.5,15);
    }

    // ── Float texts ──
    floatTexts.forEach(ft=>{
      ctx.save();ctx.globalAlpha=ft.life/ft.maxLife;ctx.fillStyle=ft.color;
      ctx.font='bold 14px Nunito';ctx.textAlign='center';ctx.shadowBlur=8;ctx.shadowColor=ft.color;
      ctx.fillText(ft.text,ft.x,ft.y);ctx.restore();
    });

    ctx.restore(); // camera transform

    // ── Screen-space UI ──
    // Minimap
    const mmW=100,mmH=75,mmX=W-mmW-10,mmY=10,mmScX=mmW/MW,mmScY=mmH/MH;
    ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(mmX,mmY,mmW,mmH);
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
    // Walls
    ctx.fillStyle='#333';
    for(let ty=0;ty<MAPH;ty++) for(let tx=0;tx<MAPW;tx++) if(map[ty][tx]) ctx.fillRect(mmX+tx*mmScX*TILE,mmY+ty*mmScY*TILE,mmScX*TILE,mmScY*TILE);
    // Zombies
    ctx.fillStyle='#4ade80';
    zombies.forEach(z=>ctx.fillRect(mmX+z.x*mmScX-1,mmY+z.y*mmScY-1,3,3));
    // Player
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(mmX+player.x*mmScX,mmY+player.y*mmScY,3,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Wave banner (fades in)
    if(waveTimer<60&&waveTimer>0&&zombies.length===0){
      ctx.save();ctx.globalAlpha=Math.min(1,(60-waveTimer)/20);ctx.textAlign='center';
      ctx.font='bold 28px Nunito';ctx.fillStyle='#facc15';ctx.shadowBlur=20;ctx.shadowColor='#facc15';
      ctx.fillText('Wave '+(wave+1)+' incoming…',W/2,H/2-20);ctx.restore();
    }

    // ── Game over screen ──
    if(gameOver){
      ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
      ctx.save();ctx.textAlign='center';
      ctx.font='bold 48px Nunito';ctx.fillStyle='#f87171';ctx.shadowBlur=30;ctx.shadowColor='#f87171';
      ctx.fillText('💀 GAME OVER',W/2,H/2-60);
      ctx.font='bold 22px Nunito';ctx.fillStyle='#fff';ctx.shadowBlur=0;
      ctx.fillText('Score: '+player.score+' pts   |   Wave: '+wave,W/2,H/2-10);
      ctx.font='bold 16px Nunito';ctx.fillStyle='#facc15';
      ctx.fillText('Coins earned: +'+Math.floor(player.score/10),W/2,H/2+25);
      ctx.font='15px Nunito';ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.fillText('Click to play again  •  ← Back to exit',W/2,H/2+60);
      ctx.restore();
    }

    // ── Start screen ──
    if(!gameStarted){
      ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
      ctx.save();ctx.textAlign='center';
      ctx.font='bold 42px Nunito';ctx.fillStyle='#4ade80';ctx.shadowBlur=25;ctx.shadowColor='#4ade80';
      ctx.fillText('🧟 ZOMBIE RUN',W/2,H/2-70);
      ctx.font='bold 16px Nunito';ctx.fillStyle='#fff';ctx.shadowBlur=0;
      ctx.fillText('Survive endless zombie waves!',W/2,H/2-30);
      ctx.font='13px Nunito';ctx.fillStyle='rgba(255,255,255,.55)';
      ctx.fillText('WASD = Move   Mouse = Aim   Click = Shoot   Shift = Dash',W/2,H/2+5);
      ctx.fillText('Grab weapon pickups to upgrade your arsenal!',W/2,H/2+28);
      ctx.font='bold 18px Nunito';ctx.fillStyle='#4ade80';ctx.shadowBlur=10;ctx.shadowColor='#4ade80';
      ctx.fillText('Click to Start',W/2,H/2+68);
      ctx.restore();
    }
  }

  // ── Click to start / restart ──
  canvas.addEventListener('click',()=>{
    if(!gameStarted){gameStarted=true;spawnWave();return;}
    if(gameOver){
      // Reset
      player={x:MW/2,y:MH/2,vx:0,vy:0,hp:100,maxHp:100,spd:3.2,weapon:'pistol',
        ammos:{pistol:Infinity,shotgun:16,uzi:60,sniper:10,rocket:6},
        fireCooldown:0,dashCooldown:0,dashTimer:0,dashDx:0,dashDy:0,invincible:0,score:0};
      zombies=[];bullets=[];particles=[];pickups=[];floatTexts=[];
      wave=0;waveTimer=0;waveZombiesLeft=0;gameOver=false;
      genMap();updateHpHud();updateAmmoHud();
      spawnWave();
    }
  });

  // ── Loop ──
  function loop(ts){
    animId=requestAnimationFrame(loop);
    update();draw();
  }
  animId=requestAnimationFrame(loop);
}

// ── INIT ──
lv=buildLv(1);resetPl();updHUD();updCoins();
showMainMenu();
</script></body></html>
